  test-elixir:
    name: "Test: Elixir (${{ matrix.os }})"
    if: |
      always() && !cancelled() &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.elixir == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true')
    needs: [build-ffi, changes]
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      KREUZBERG_BUILD: "1"
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Tesseract tessdata (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /c/tess/tessdata
          curl -fsSL -o /c/tess/tessdata/eng.traineddata \
            "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata"
          curl -fsSL -o /c/tess/tessdata/osd.traineddata \
            "https://github.com/tesseract-ocr/tessdata_fast/raw/main/osd.traineddata"
          echo "TESSDATA_PREFIX=/c/tess/tessdata" >> "$GITHUB_ENV"

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        id: rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: elixir-test-${{ matrix.os }}
          use-sccache: "false"
          report-stats: "true"

      - name: Clean stale workspace fingerprints
        shell: bash
        run: |
          echo "Preparing clean Rust build environment..."
          cargo clean --release -p kreuzberg-ffi 2>/dev/null || true
          cargo clean --release -p kreuzberg 2>/dev/null || true

      - name: Setup Elixir (Windows)
        if: runner.os == 'Windows'
        uses: erlef/setup-elixir@v1
        env:
          ImageOS: win22
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Setup Elixir (non-Windows)
        if: runner.os != 'Windows'
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Stage ONNX Runtime DLL next to FFI output (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ORT_DLL="${ORT_DYLIB_PATH}"
          if [ -f "$ORT_DLL" ]; then
            for dir in target/release packages/elixir/priv/native; do
              mkdir -p "$dir"
              cp "$ORT_DLL" "$dir/"
              echo "Staged onnxruntime.dll to $dir/"
            done
          else
            echo "WARNING: ORT_DYLIB_PATH not found: $ORT_DLL"
          fi

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Restore Elixir dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            packages/elixir/deps
            packages/elixir/_build
          key: elixir-deps-${{ runner.os }}-${{ hashFiles('packages/elixir/mix.lock') }}
          restore-keys: |
            elixir-deps-${{ runner.os }}-

      - name: Install Elixir dependencies
        shell: bash
        working-directory: packages/elixir
        run: mix deps.get

      - name: Compile Elixir (warnings as errors in CI)
        shell: bash
        working-directory: packages/elixir
        env:
          MIX_ENV: test
          KREUZBERG_BUILD: "1"
        run: mix compile --warnings-as-errors

      - name: Run Elixir tests
        shell: bash
        working-directory: packages/elixir
        env:
          KREUZBERG_BUILD: "1"
        run: mix test

      - name: Set library paths for E2E tests
        shell: bash
        run: |
          source scripts/lib/library-paths.sh
          setup_onnx_paths
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "DYLD_LIBRARY_PATH=${DYLD_LIBRARY_PATH:-}"
            echo "DYLD_FALLBACK_LIBRARY_PATH=${DYLD_FALLBACK_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        env:
          KREUZBERG_BUILD: "1"
          KREUZBERG_CACHE_DIR: ${{ github.workspace }}/.kreuzberg-cache
        run: task elixir:e2e:test

  test-r:
    name: "Test: R (${{ matrix.os }})"
    if: |
      always() && !cancelled() &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.r == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true')
    needs: [build-ffi, changes]
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: r-test-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R dependencies
        shell: bash
        run: |
          Rscript -e "install.packages(c('testthat', 'jsonlite', 'withr'), repos = 'https://cran.r-project.org')"

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: ${{ env.CARGO_TARGET_DIR || 'target' }}/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Vendor kreuzberg core crate
        shell: bash
        run: python3 scripts/ci/r/vendor-kreuzberg-core.py

      - name: Build and install R package
        shell: bash
        run: task r:build:ci

      - name: Run R tests
        shell: bash
        run: task r:test:ci

      - name: Run E2E tests
        shell: bash
        run: task r:e2e:test

  test-c-ffi:
    name: "Test: C FFI (${{ matrix.os }})"
    if: |
      always() && !cancelled() &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true')
    needs: [build-ffi, changes]
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        if: runner.os != 'Windows'
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}
          dest-dir: target/release

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Make FFI library executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x target/release/libkreuzberg_ffi.* 2>/dev/null || true

      - name: Compile C tests
        if: runner.os != 'Windows'
        shell: bash
        run: make -C crates/kreuzberg-ffi/tests/c LIBDIR="$(pwd)/target/release" clean all

      - name: Run C tests
        if: runner.os != 'Windows'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: |
          FAILED=0
          for test in crates/kreuzberg-ffi/tests/c/test_*; do
            [ -x "$test" ] || continue
            name=$(basename "$test")
            if "$test"; then
              echo "PASS: $name"
            else
              echo "FAIL: $name"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Verify pkg-config output
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PC_DIR="$(pwd)/target/release"
          PC_FILE=$(find "$PC_DIR" -name 'kreuzberg-ffi.pc' 2>/dev/null | head -1)
          if [ -z "$PC_FILE" ]; then
            echo "Warning: kreuzberg-ffi.pc not found in release artifacts"
          else
            echo "Found pkg-config file: $PC_FILE"
            cat "$PC_FILE"
          fi

      - name: Verify header version constants
        if: runner.os != 'Windows'
        shell: bash
        run: |
          HEADER="crates/kreuzberg-ffi/kreuzberg.h"
          echo "Checking version constants in $HEADER..."
          grep 'KREUZBERG_VERSION_MAJOR' "$HEADER"
          grep 'KREUZBERG_VERSION_MINOR' "$HEADER"
          grep 'KREUZBERG_VERSION_PATCH' "$HEADER"
          grep 'KREUZBERG_VERSION ' "$HEADER"
          echo "Version constants verified."

      - name: Verify CMake config files exist
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f crates/kreuzberg-ffi/cmake/kreuzberg-ffi-config.cmake
          test -f crates/kreuzberg-ffi/cmake/kreuzberg-ffi-config-version.cmake
          echo "CMake config files verified."

      - name: Verify header generated (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          test -f crates/kreuzberg-ffi/kreuzberg.h
          grep 'KREUZBERG_VERSION_MAJOR' crates/kreuzberg-ffi/kreuzberg.h
          echo "Header verified on Windows."

  test-wasm:
    name: "Test: WASM (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-wasm]
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Configure WASM C compiler
        shell: bash
        run: |
          echo "CC_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/ar" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-test-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"
          target: wasm32-unknown-unknown

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-${{ matrix.target }}
          path: crates/kreuzberg-wasm/pkg/

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run WASM tests
        shell: bash
        working-directory: crates/kreuzberg-wasm
        run: pnpm run build --minify && pnpm test
        env:
          RUST_BACKTRACE: 1

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  test-cli:
    name: "Test: CLI (${{ matrix.os }})"
    if: |
      always() && !cancelled() &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true' || needs.changes.outputs.rust == 'true')
    needs: [build-ffi, changes]
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Setup Tesseract cache
        uses: ./.github/actions/setup-tesseract-cache
        with:
          label: ${{ matrix.os }}
          enable-cache: "true"

      - name: Make binaries executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x target/release/kreuzberg target/release/libkreuzberg_ffi.* 2>/dev/null || true

      - name: Verify CLI binary exists
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f target/release/kreuzberg.exe
            echo "CLI binary found: target/release/kreuzberg.exe"
          else
            test -f target/release/kreuzberg
            echo "CLI binary found: target/release/kreuzberg"
          fi

      - name: Set library paths
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/target/release:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Test CLI version
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./target/release/kreuzberg.exe --version
          else
            ./target/release/kreuzberg --version
          fi

      - name: Test CLI help
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./target/release/kreuzberg.exe --help
          else
            ./target/release/kreuzberg --help
          fi

      - name: Test CLI with sample document
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            CLI="./target/release/kreuzberg.exe"
          else
            CLI="./target/release/kreuzberg"
          fi
          TEST_DOC=$(find test_documents -name '*.pdf' -type f -print -quit 2>/dev/null || true)
          if [ -n "$TEST_DOC" ]; then
            echo "Testing CLI with: $TEST_DOC"
            $CLI extract "$TEST_DOC" || echo "CLI extraction test failed (may be expected)"
          else
            echo "No test documents found, skipping integration test"
          fi
