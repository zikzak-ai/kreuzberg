name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PDFIUM_VERSION: "7455"
  ORT_VERSION: "1.23.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: validate-stage

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Install Ruby dependencies for lint
        working-directory: packages/ruby
        run: bundle install --jobs 4 --retry 3

      - name: Install Python Dependencies
        run: uv sync --all-extras --all-packages --all-groups --no-install-project
        shell: bash

      - name: Install prek
        run: |
          uv tool install prek
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Load Cached Prek Dependencies
        id: cached-prek-dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek/
          key: prek|${{ runner.os }}|${{ runner.arch }}|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Execute Prek
        run: prek run --show-diff-on-failure --color=always --all-files

  ts-test:
    name: TypeScript Tests (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Task
        uses: ./.github/actions/setup-task

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: typescript-${{ matrix.os }}-${{ matrix.node-version }}

      - name: Cache Pdfium binaries
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download Pdfium runtime
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage Pdfium runtime artifacts
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: crates/kreuzberg-node

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Build NAPI-RS bindings
        working-directory: crates/kreuzberg-node
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos-latest' && '11.0' || env.MACOSX_DEPLOYMENT_TARGET }}
        run: pnpm run build

      - name: Link built NAPI bindings to workspace
        run: pnpm install -r

      - name: Verify TypeScript E2E suite
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20'
        uses: ./.github/actions/run-and-ensure-clean
        with:
          run: task e2e:ts:verify

      - name: Run tests (Linux, Node 20 - with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20'
        working-directory: packages/typescript
        run: pnpm test:coverage

      - name: Run tests (other platforms/versions)
        if: matrix.os != 'ubuntu-latest' || matrix.node-version != '20'
        working-directory: packages/typescript
        run: pnpm test

      - name: Cleanup Rust cache before save
        if: always()
        uses: ./.github/actions/cleanup-rust-cache

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20'
        uses: actions/upload-artifact@v5
        with:
          name: typescript-coverage-${{ github.sha }}
          path: packages/typescript/coverage/
          retention-days: 7

  py-test:
    name: Python Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      HF_HOME: ~/.cache/huggingface
      TRANSFORMERS_CACHE: ~/.cache/huggingface
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Task
        uses: ./.github/actions/setup-task

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: python-${{ matrix.os }}-${{ matrix.python-version }}

      - name: Cache Pdfium binaries
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Build and install Python package
        shell: bash
        run: |
          set -euo pipefail
          cd packages/python
          uv run maturin develop --release
          cd ..
          cargo build -p kreuzberg-cli --release --features all

      - name: Install SpaCy model (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        run: uv pip install "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl"

      - name: Verify Python E2E suite
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        env:
          RUST_MIN_STACK: 16777216  # 16MB stack size for HTML parsing in Rust core
        uses: ./.github/actions/run-and-ensure-clean
        with:
          run: task e2e:python:verify

      - name: Run tests (Linux, Python 3.10 - with coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        env:
          RUST_MIN_STACK: 16777216  # 16MB stack size for HTML parsing in Rust core
        run: uv run pytest -vv --cov=kreuzberg --cov-report=lcov:coverage.lcov --cov-report=term --cov-config=pyproject.toml --reruns 1 --reruns-delay 1

      - name: Run tests (other platforms/versions)
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.10'
        env:
          RUST_MIN_STACK: 16777216  # 16MB stack size for HTML parsing in Rust core
        run: uv run pytest -vv --reruns 1 --reruns-delay 1

      - name: Cleanup Rust cache before save
        if: always()
        uses: ./.github/actions/cleanup-rust-cache

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v5
        with:
          name: python-coverage-${{ github.sha }}
          path: |
            coverage.lcov
            .coverage
          retention-days: 7

      - name: Upload coverage to DeepSource
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && env.DEEPSOURCE_DSN != ''
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        shell: bash
        run: |
          curl -fsSL https://deepsource.io/cli | sh
          ./bin/deepsource report --analyzer test-coverage --key python --value-file ./coverage.lcov

  v3-test:
    name: V3 Tests (Python 3.10, ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_HOME: ~/.cache/huggingface
      TRANSFORMERS_CACHE: ~/.cache/huggingface
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for v3 changes
        id: check-v3
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^v3/'; then
            echo "v3_changed=true" >> $GITHUB_OUTPUT
          else
            echo "v3_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python environment
        if: steps.check-v3.outputs.v3_changed == 'true'
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.10"

      - name: Install system dependencies
        if: steps.check-v3.outputs.v3_changed == 'true'
        uses: ./.github/actions/install-system-deps

      - name: Install v3 dependencies
        if: steps.check-v3.outputs.v3_changed == 'true'
        working-directory: v3
        run: uv sync --all-extras

      - name: Run v3 tests
        if: steps.check-v3.outputs.v3_changed == 'true'
        working-directory: v3
        run: uv run pytest -vv --reruns 1 --reruns-delay 1 tests/

  ruby-test:
    name: Ruby Tests (Ruby ${{ matrix.ruby-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby-version: ["3.3", "3.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Task
        uses: ./.github/actions/setup-task

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: ruby-${{ matrix.os }}-${{ matrix.ruby-version }}

      - name: Cache Pdfium binaries
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Download Pdfium runtime
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage Pdfium runtime artifacts
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: packages/ruby/ext/kreuzberg_rb/native
          additional-destinations: |
            packages/ruby
            packages/ruby/lib

      - name: Install Ruby dependencies
        working-directory: packages/ruby
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Build Ruby native extension
        working-directory: packages/ruby
        run: bundle exec rake compile

      - name: Verify Ruby E2E suite
        if: matrix.os == 'ubuntu-latest' && matrix.ruby-version == '3.4'
        uses: ./.github/actions/run-and-ensure-clean
        with:
          run: task e2e:ruby:verify

      - name: Run tests
        working-directory: packages/ruby
        run: bundle exec rspec --format documentation

  rust-unit:
    name: Rust Unit Tests (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: rust-unit-${{ matrix.os }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Run unit tests (no default features)
        env:
          RUST_MIN_STACK: 16777216  # 16MB stack size for HTML parsing
        run: cargo test --workspace --exclude kreuzberg-e2e-generator

  rust-e2e:
    name: Rust E2E Tests (release)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: rust-e2e

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install Task
        uses: ./.github/actions/setup-task

      - name: Verify Rust E2E suite
        env:
          RUST_MIN_STACK: 16777216  # 16MB stack size for HTML parsing
        uses: ./.github/actions/run-and-ensure-clean
        with:
          run: task e2e:rust:verify

  build-cli:
    name: Build CLI binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: cli-${{ matrix.os }}

      - name: Determine target triple
        id: target
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) echo "triple=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
            macos-latest) echo "triple=aarch64-apple-darwin" >> "$GITHUB_OUTPUT" ;;
            windows-latest) echo "triple=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build CLI
        uses: ./.github/actions/build-cli
        with:
          target: ${{ steps.target.outputs.triple }}
          use-cross: "false"

  build-node:
    name: Build Node.js bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: node-${{ matrix.os }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Determine target triple
        id: target
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) echo "triple=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
            macos-latest) echo "triple=aarch64-apple-darwin" >> "$GITHUB_OUTPUT" ;;
            windows-latest) echo "triple=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build Node bindings
        uses: ./.github/actions/build-node
        with:
          target: ${{ steps.target.outputs.triple }}
          use-cross: "false"

  build-ruby:
    name: Build Ruby gem (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: ruby-${{ matrix.os }}

      - name: Cache Pdfium binaries
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download Pdfium runtime
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Install MSYS2 toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ridk exec pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ortVersion = "${{ env.ORT_VERSION }}"
          $ortDir = Join-Path $env:RUNNER_TEMP "onnxruntime\x86_64-pc-windows-gnu"
          if (-Not (Test-Path (Join-Path $ortDir "onnxruntime-win-x64-$ortVersion\lib\onnxruntime.dll"))) {
            New-Item -ItemType Directory -Force -Path $ortDir | Out-Null
            $zipPath = Join-Path $ortDir "onnxruntime.zip"
            $url = "https://github.com/microsoft/onnxruntime/releases/download/v$ortVersion/onnxruntime-win-x64-$ortVersion.zip"
            Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
            Expand-Archive -Path $zipPath -DestinationPath $ortDir -Force
          }
          $onnxRoot = Get-ChildItem -Path $ortDir -Directory | Where-Object { $_.Name -like "onnxruntime-win-x64-*" } | Select-Object -First 1
          if (-not $onnxRoot) { throw "ONNX Runtime archive not found" }
          $destDir = Join-Path $env:GITHUB_WORKSPACE "packages\ruby\lib"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item -Path (Join-Path $onnxRoot.FullName "lib\*") -Destination $destDir -Force
          $envLines = @(
            "ORT_STRATEGY=system",
            "ORT_LIB_LOCATION=$($onnxRoot.FullName)\lib",
            "ORT_SKIP_DOWNLOAD=1",
            "ORT_PREFER_DYNAMIC_LINK=1",
            "ORT_DYLIB_PATH=$($onnxRoot.FullName)\lib"
          )
          $envLines | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $onnxRoot.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Ruby gem (Unix)
        if: runner.os != 'Windows'
        uses: ./.github/actions/build-ruby-unix
        with:
          platform: ${{ runner.os == 'Linux' && 'x86_64-linux' || 'arm64-darwin' }}

      - name: Build Ruby gem (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/build-ruby-windows
        with:
          platform: x64-mingw32

  smoke:
    name: Smoke Tests (${{ matrix.os }})
    needs: [build-cli, build-node, build-ruby]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup Ruby
        if: runner.os != 'Windows'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Smoke test CLI from source
        uses: ./.github/actions/smoke-cli
        with:
          cli-artifacts-dir: ""

      - name: Smoke test Node.js from source
        uses: ./.github/actions/smoke-node
        with:
          package-tarball: ""

      - name: Smoke test Python from source
        uses: ./.github/actions/smoke-python
        with:
          wheel-path: ""

      - name: Smoke test Ruby from source
        if: runner.os != 'Windows'
        uses: ./.github/actions/smoke-ruby
        with:
          gem-path: ""

      - name: Smoke test Rust crate
        uses: ./.github/actions/smoke-rust
