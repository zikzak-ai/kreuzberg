name: CI

on:
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "scripts/**"
      - "docker/**"
      - "fixtures/**"
      - "test_documents/**"
      - ".github/**"
      - ".cargo/config.toml"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - ".dockerignore"
      - "biome.json"
      - "pyproject.toml"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "rust-toolchain.toml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "scripts/**"
      - "docker/**"
      - "fixtures/**"
      - "test_documents/**"
      - ".github/**"
      - ".cargo/config.toml"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - ".dockerignore"
      - "biome.json"
      - "pyproject.toml"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "rust-toolchain.toml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  ORT_VERSION: "1.24.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  BUILD_PROFILE: "ci"

permissions:
  contents: read

# --- Stage 1: Validate ---

jobs:
  validate:
    name: "Validate"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: validate-py

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: packages/ruby
        env:
          BUNDLE_LOCKFILE_CHECKSUMS: "false"

      - name: Install E2E Ruby dependencies
        run: cd e2e/ruby && bundle install
        shell: bash

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer

      - name: Install PHP dependencies
        run: |
          cd packages/php
          composer install
        shell: bash

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Elixir dependencies
        run: |
          cd packages/elixir
          mix deps.get
        shell: bash

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('styler', 'lintr', 'testthat', 'jsonlite', 'withr'), repos = 'https://cloud.r-project.org')"
        shell: bash

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run universal prek hooks
        uses: j178/prek-action@v2
        with:
          extra-args: trailing-whitespace end-of-file-fixer check-merge-conflict check-added-large-files detect-private-key check-json check-yaml check-toml check-case-conflict pyproject-fmt shfmt shellcheck actionlint ai-rulez-generate --all-files

      - name: Run language-specific lint hooks
        uses: j178/prek-action@v2
        with:
          extra-args: ruff ruff-format mypy biome-format biome-lint oxlint ruby-format ruby-lint cpd checkstyle java-verify csharp-format csharp-lint php-format php-lint mix-credo mix-format r-format r-lint --all-files

      - name: Validate vendored C headers match canonical
        shell: bash
        run: |
          CANONICAL="crates/kreuzberg-ffi/kreuzberg.h"
          FAIL=0
          for VENDORED in packages/go/v4/internal/ffi/kreuzberg.h packages/ruby/vendor/kreuzberg-ffi/kreuzberg.h packages/r/vendor/kreuzberg-ffi/kreuzberg.h; do
            if [ -f "$VENDORED" ] && ! diff -q "$CANONICAL" "$VENDORED" > /dev/null 2>&1; then
              echo "::error::$VENDORED is out of sync with $CANONICAL — run 'python scripts/sync_versions.py'"
              diff "$CANONICAL" "$VENDORED" | head -20
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

  validate-rust:
    name: "Validate: Rust"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space before setup
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: validate-rust
          use-sccache: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run Rust lint checks
        run: task rust:lint:check

      - name: Run C lint checks
        run: task c:lint:check

      - name: Check final disk space
        if: always()
        run: scripts/ci/validate/show-disk-space.sh "Final disk space"
        shell: bash

      - name: Cleanup build artifacts after lint
        if: always()
        run: scripts/ci/validate/cleanup-after-lint.sh
        shell: bash

  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04-arm
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      ruby: ${{ steps.filter.outputs.ruby }}
      php: ${{ steps.filter.outputs.php }}
      go: ${{ steps.filter.outputs.go }}
      java: ${{ steps.filter.outputs.java }}
      csharp: ${{ steps.filter.outputs.csharp }}
      elixir: ${{ steps.filter.outputs.elixir }}
      r: ${{ steps.filter.outputs.r }}
      wasm: ${{ steps.filter.outputs.wasm }}
      ffi: ${{ steps.filter.outputs.ffi }}
      docker: ${{ steps.filter.outputs.docker }}
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - 'crates/kreuzberg/**'
              - 'crates/kreuzberg-tesseract/**'
              - 'crates/kreuzberg-paddle-ocr/**'
              - 'crates/kreuzberg-pdfium-render/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - 'fixtures/**'
              - 'tools/e2e-generator/**'
            rust:
              - 'crates/kreuzberg/**'
              - 'crates/kreuzberg-cli/**'
              - 'crates/kreuzberg-tesseract/**'
              - 'crates/kreuzberg-paddle-ocr/**'
              - 'crates/kreuzberg-pdfium-render/**'
              - 'e2e/rust/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tools/e2e-generator/**'
              - 'tools/benchmark-harness/**'
            ffi:
              - 'crates/kreuzberg-ffi/**'
              - 'crates/kreuzberg/**'
            python:
              - 'crates/kreuzberg-py/**'
              - 'packages/python/**'
              - 'e2e/python/**'
              - 'fixtures/**'
            typescript:
              - 'crates/kreuzberg-node/**'
              - 'packages/typescript/**'
              - 'e2e/typescript/**'
              - 'fixtures/**'
            ruby:
              - 'packages/ruby/**'
              - 'e2e/ruby/**'
              - 'fixtures/**'
            php:
              - 'crates/kreuzberg-php/**'
              - 'packages/php/**'
              - 'e2e/php/**'
              - 'fixtures/**'
            go:
              - 'packages/go/**'
              - 'e2e/go/**'
              - 'crates/kreuzberg-ffi/**'
              - 'fixtures/**'
            java:
              - 'packages/java/**'
              - 'e2e/java/**'
              - 'crates/kreuzberg-ffi/**'
              - 'fixtures/**'
            csharp:
              - 'packages/csharp/**'
              - 'e2e/csharp/**'
              - 'crates/kreuzberg-ffi/**'
              - 'fixtures/**'
            elixir:
              - 'packages/elixir/**'
              - 'e2e/elixir/**'
              - 'fixtures/**'
            r:
              - 'packages/r/**'
              - 'e2e/r/**'
              - 'crates/kreuzberg-ffi/**'
              - 'fixtures/**'
            wasm:
              - 'crates/kreuzberg-wasm/**'
              - 'e2e/wasm-deno/**'
              - 'e2e/wasm-workers/**'
              - 'fixtures/**'
            docker:
              - 'Dockerfile*'
              - 'docker/**'
              - '.dockerignore'

  # --- Stage 2: Build FFI + Rust Tests + Docker ---

  build-ffi:
    needs: [validate, validate-rust, changes]
    name: "Build: FFI (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ffi-${{ matrix.os }}
          target: ${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Configure bindgen compatibility headers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: scripts/ci/rust/configure-bindgen-windows.ps1

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Pre-build diagnostics
        shell: bash
        run: scripts/ci/rust/pre-build-diagnostics.sh

      - name: Build kreuzberg-ffi (release)
        run: cargo build --release -p kreuzberg-ffi
        shell: bash

      - name: Build kreuzberg-cli (release, --features all)
        run: cargo build --release -p kreuzberg-cli --features all
        shell: bash

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffi-${{ matrix.os }}
          path: |
            target/release/libkreuzberg_ffi.*
            target/release/kreuzberg_ffi.*
            crates/kreuzberg-ffi/kreuzberg.h
            crates/kreuzberg-ffi/kreuzberg-ffi.pc
            crates/kreuzberg-ffi/cmake/
            target/release/kreuzberg
            target/release/kreuzberg.exe
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  rust-tests:
    needs: [validate, validate-rust, changes]
    name: "Test: Rust (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.rust == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: rust-tests-${{ matrix.os }}
          target: ${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Configure bindgen compatibility headers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: scripts/ci/rust/configure-bindgen-windows.ps1

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Configure Tesseract data path
        shell: bash
        run: scripts/ci/rust/setup-tessdata-env.sh

      - name: Pre-build diagnostics
        shell: bash
        run: scripts/ci/rust/pre-build-diagnostics.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run unit tests
        run: task rust:test:ci
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH || '' }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH || '' }}

      - name: Run E2E tests
        if: matrix.os == 'ubuntu-latest'
        env:
          TESSDATA_PREFIX: "/usr/share/tesseract-ocr/5/tessdata"
          LD_LIBRARY_PATH: "${{ github.workspace }}/target/release:${{ env.LD_LIBRARY_PATH || '' }}"
          DYLD_LIBRARY_PATH: "${{ github.workspace }}/target/release:${{ env.DYLD_LIBRARY_PATH || '' }}"
        run: task rust:e2e:test
        shell: bash

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  docker-build:
    needs: [validate, validate-rust, changes]
    name: "Build: Docker (${{ matrix.variant }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.docker == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        variant:
          - core
          - full
          - cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free up disk space
        shell: bash
        run: scripts/ci/docker/free-disk-space.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (core/full)
        if: matrix.variant != 'cli'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          push: false
          load: true
          tags: kreuzberg:${{ matrix.variant }}
          build-args: |
            ONNXRUNTIME_VERSION=${{ env.ORT_VERSION }}
          cache-from: type=gha,scope=ci-docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=ci-docker-${{ matrix.variant }}

      - name: Build Docker image (cli)
        if: matrix.variant == 'cli'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.cli
          push: false
          load: true
          tags: kreuzberg:cli
          cache-from: type=gha,scope=ci-docker-cli
          cache-to: type=gha,mode=max,scope=ci-docker-cli

      - name: Save Docker image as artifact (core/full)
        if: matrix.variant != 'cli'
        shell: bash
        run: scripts/ci/docker/save-image.sh "${{ matrix.variant }}" /tmp

      - name: Save Docker image as artifact (cli)
        if: matrix.variant == 'cli'
        shell: bash
        run: |
          mkdir -p /tmp
          docker save kreuzberg:cli | gzip > /tmp/kreuzberg-cli.tar.gz
          ls -lh /tmp/kreuzberg-cli.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp/kreuzberg-${{ matrix.variant }}.tar.gz
          retention-days: 7
          compression-level: 0

  docker-test:
    needs: [docker-build]
    name: "Test: Docker (${{ matrix.variant }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        variant:
          - core
          - full
          - cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free up disk space
        shell: bash
        run: scripts/ci/docker/free-disk-space.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp

      - name: Load Docker image
        shell: bash
        run: docker load < /tmp/kreuzberg-${{ matrix.variant }}.tar.gz

      - name: Test Docker image size (core/full)
        if: matrix.variant != 'cli'
        shell: bash
        run: scripts/ci/docker/check-image-size.sh "${{ matrix.variant }}"

      - name: Test Docker image size (cli)
        if: matrix.variant == 'cli'
        shell: bash
        run: |
          size_mb=$(docker inspect kreuzberg:cli --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "CLI image size: ${size_mb}MB"
          if [ "$size_mb" -gt 200 ]; then
            echo "::warning::CLI image is larger than 200MB (${size_mb}MB). Expected a minimal static binary image."
          fi

      - name: Run comprehensive feature tests (core/full)
        if: matrix.variant != 'cli'
        run: scripts/ci/docker/run-feature-tests.sh "${{ matrix.variant }}"

      - name: Run configuration tests (core/full)
        if: matrix.variant != 'cli'
        run: scripts/ci/docker/run-config-tests.sh "${{ matrix.variant }}"

      - name: Run API contract tests with schemathesis (core/full)
        if: matrix.variant != 'cli'
        run: |
          pip3 install schemathesis
          container_id=$(docker run -d -p 8000:8000 kreuzberg:${{ matrix.variant }})
          sleep 5
          FAILED=0
          schemathesis run http://localhost:8000/openapi.json \
            --max-examples=10 \
            --request-timeout=30000 \
            --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance,negative_data_rejection || FAILED=1
          docker stop "$container_id"
          exit "$FAILED"

      - name: Run CLI feature tests
        if: matrix.variant == 'cli'
        run: scripts/ci/docker/run-cli-tests.sh

      - name: Upload test results
        if: always() && matrix.variant != 'cli' && hashFiles('/tmp/kreuzberg-docker-test-results.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-results-${{ matrix.variant }}
          path: /tmp/kreuzberg-docker-test-results.json
          retention-days: 7

      - name: Upload CLI test results
        if: always() && matrix.variant == 'cli' && hashFiles('/tmp/kreuzberg-docker-cli-test-results.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-results-cli
          path: /tmp/kreuzberg-docker-cli-test-results.json
          retention-days: 7

      - name: Collect Docker logs on failure
        if: failure()
        shell: bash
        run: scripts/ci/docker/collect-logs.sh /tmp/docker-logs

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs-${{ matrix.variant }}
          path: /tmp/docker-logs/
          retention-days: 7

      - name: Clean up Docker resources (core/full)
        if: always() && matrix.variant != 'cli'
        shell: bash
        run: scripts/ci/docker/cleanup.sh "${{ matrix.variant }}"

      - name: Clean up Docker resources (cli)
        if: always() && matrix.variant == 'cli'
        shell: bash
        run: |
          docker ps -aq --filter "name=kreuzberg-cli-test" | xargs -r docker rm -f || true
          docker rmi kreuzberg:cli || true
          docker system prune -af --volumes || true

      - name: Summary (core/full)
        if: success() && matrix.variant != 'cli'
        shell: bash
        run: scripts/ci/docker/summary.sh "${{ matrix.variant }}" /tmp/kreuzberg-docker-test-results.json

      - name: Summary (cli)
        if: success() && matrix.variant == 'cli'
        shell: bash
        run: |
          echo "Docker CLI image built and tested successfully!"
          echo "Image: kreuzberg:cli"
          if [ -f /tmp/kreuzberg-docker-cli-test-results.json ]; then
            echo "Test Results:"
            jq . < /tmp/kreuzberg-docker-cli-test-results.json || cat /tmp/kreuzberg-docker-cli-test-results.json
          fi

  # --- Stage 3: Build Bindings ---

  build-python:
    needs: [rust-tests, changes, validate, validate-rust]
    name: "Build: Python (${{ matrix.target }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.python == 'true')
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: python-${{ matrix.platform }}
          target: ${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Clippy (kreuzberg-py)
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: cargo clippy -p kreuzberg-py -- -D warnings

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: wheels-${{ matrix.platform }}

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Clean previous wheel artifacts
        shell: bash
        run: scripts/ci/python/clean-artifacts.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build CLI with features
        shell: bash
        run: |
          echo "=== Building CLI Binary with Features ==="
          cargo build --release --package kreuzberg-cli --features all
          mkdir -p packages/python/kreuzberg
          # Copy with correct name (kreuzberg-cli) to match pyproject.toml include paths
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/kreuzberg.exe packages/python/kreuzberg/kreuzberg-cli.exe
          else
            cp target/release/kreuzberg packages/python/kreuzberg/kreuzberg-cli
          fi

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-py from source (with sccache fallback)"
          scripts/ci/actions/setup-rust/build-with-sccache-fallback.sh cargo build --release --package kreuzberg-py

      - name: Build Python wheels
        id: wheels
        shell: bash
        run: |
          echo "=== Building Python Wheels ==="
          echo "Building Python wheels from source (no caching)"
          task python:build:ci

      - name: Report cache statistics
        if: always()
        shell: bash
        run: |
          echo "=== Python Build Cache Statistics ==="
          echo "Platform: ${{ matrix.platform }}"
          echo "Target: ${{ matrix.target }}"
          if [ -d "target/wheels" ]; then
            echo "Wheels artifacts:"
            du -sh target/wheels || echo "target/wheels: empty"
            find target/wheels -maxdepth 1 -name "*.whl" -exec ls -lh {} \; 2>/dev/null | awk '{print $9, $5}' || echo "No wheel files found"
          fi
          if [ -d "packages/python/dist" ]; then
            echo "Python dist artifacts:"
            du -sh packages/python/dist || echo "packages/python/dist: empty"
            find packages/python/dist -maxdepth 1 -name "*.whl" -exec ls -lh {} \; 2>/dev/null | awk '{print $9, $5}' || echo "No dist wheel files found"
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: target/wheels/*.whl
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-python-sdist:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: Python Sdist"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.python == 'true')
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: python-sdist
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: sdist

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build sdist
        shell: bash
        run: task python:build:sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: target/wheels/*.tar.gz
          retention-days: 7

  build-node:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: Node (${{ matrix.target }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.typescript == 'true')
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 360 || (matrix.os == 'ubuntu-24.04-arm' && 240 || 180) }}
    # Serialize matrix jobs to prevent concurrent cache API writes that trigger rate limits
    concurrency:
      group: ci-node-build-${{ github.event.pull_request.number || github.ref }}-${{ matrix.platform }}
      cancel-in-progress: false
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Dump system information
        shell: bash
        run: |
          echo "=== System Information ==="
          uname -a
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Get-CimInstance Win32_OperatingSystem | Select-Object Version"
            powershell -Command "Get-CimInstance Win32_Processor | Select-Object Name"
            powershell -Command "Get-CimInstance Win32_OperatingSystem | Select-Object @{Name='TotalMemoryGB'; Expression={[Math]::Round(\$_.TotalVisibleMemorySize / 1MB, 2)}}"
          fi
          echo "=== Disk Space ==="
          df -h

      - name: Dump environment variables (debug)
        shell: bash
        run: |
          echo "=== Environment Variables ==="
          env | sort
          echo "=== GitHub Context ==="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: node-${{ matrix.platform }}
          target: ${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Clippy (kreuzberg-node)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: cargo clippy -p kreuzberg-node -- -D warnings

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build or restore Node bindings from cache
        id: node
        uses: kreuzberg-dev/actions/build-and-cache-binding@v1
        with:
          binding-name: node
          platform: ${{ matrix.platform }}
          build-command: task node:build:ci
          cache-paths: |
            crates/kreuzberg-node/
          cache-version: v4
          rust-hash: "n/a"
          binding-files: |
            crates/kreuzberg-node/**
            crates/kreuzberg/src/**
          dep-files: |
            Cargo.lock
            crates/kreuzberg-node/package.json
            crates/kreuzberg-node/pnpm-lock.yaml

      - name: Report Node binding artifacts size
        shell: bash
        run: |
          echo "=== Node Binding Artifacts ==="
          if [ -d "crates/kreuzberg-node" ]; then
            du -sh crates/kreuzberg-node
            find crates/kreuzberg-node -maxdepth 1 \( -name "*.node" -o -name "*.tgz" -o -name "index.js" \) -exec ls -lh {} \;
          fi

      - name: Pack Node package
        shell: bash
        run: |
          cd crates/kreuzberg-node
          npm pack --ignore-scripts

      - name: Build TypeScript wrapper
        shell: bash
        env:
          VERBOSE: "1"
        run: |
          set -x
          time task node:build
          set +x

      - name: Verify TypeScript build artifacts
        shell: bash
        run: scripts/ci/node/verify-ts-artifacts.sh

      - name: Upload Node bindings
        uses: actions/upload-artifact@v7
        with:
          name: napi-${{ matrix.target }}
          path: |
            crates/kreuzberg-node/*.node
            crates/kreuzberg-node/index.js
            crates/kreuzberg-node/*.tgz
            crates/kreuzberg-node/artifacts/**
            crates/kreuzberg-node/dist/**
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-ruby:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: Ruby Gem (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ruby == 'true')
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    # Note: BUNDLE_GEMFILE is set per-step to avoid Windows path issues.
    # On Windows, github.workspace paths like D:/a/... get mangled to D:/d/a/... in bash shells.
    # Note: kreuzberg-rb has a Rust dependency on kreuzberg-ffi (Cargo.toml path dep), so it must
    # compile kreuzberg-ffi as a crate dependency via `cargo build`. It cannot use the pre-built
    # FFI artifact from build-ffi, so build-ruby does NOT depend on build-ffi.
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Verify OpenSSL setup
        shell: bash
        run: |
          echo "=== OpenSSL Verification ==="
          echo "Platform: $(uname -m)"
          echo "OPENSSL_DIR: ${OPENSSL_DIR:-<not set>}"
          echo "OPENSSL_LIB_DIR: ${OPENSSL_LIB_DIR:-<not set>}"
          echo "OPENSSL_INCLUDE_DIR: ${OPENSSL_INCLUDE_DIR:-<not set>}"
          if [ -n "${OPENSSL_DIR:-}" ]; then
            echo ""
            echo "Checking for libssl:"
            find "$OPENSSL_DIR" -name "libssl*" 2>/dev/null | head -5 || echo "No libssl found"
          fi

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ruby-${{ matrix.os }}
          toolchain: ${{ runner.os == 'Windows' && 'stable-x86_64-pc-windows-msvc' || '' }}
          target: ${{ runner.os == 'Windows' && 'x86_64-pc-windows-msvc' || '' }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Detect partial cache hit and clean stale fingerprints
        shell: bash
        run: |
          if [ -d "target" ]; then
            echo "Cleaning stale build artifacts to prevent fingerprint errors"
            cargo clean --release -p kreuzberg-ffi 2>/dev/null || true
            cargo clean --release -p kreuzberg 2>/dev/null || true
            # Clean rb_sys build directory to prevent stale fingerprints in packages/ruby/tmp
            if [ -d "packages/ruby/tmp" ]; then
              echo "Cleaning rb_sys build directory: packages/ruby/tmp"
              rm -rf packages/ruby/tmp
            fi
          else
            echo "No target directory found, skipping cache cleanup"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: packages/ruby

      - name: Set BUNDLE_GEMFILE (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "BUNDLE_GEMFILE=${{ github.workspace }}/packages/ruby/Gemfile" >> "$GITHUB_ENV"

      - name: Install Ruby dependencies
        shell: bash
        working-directory: packages/ruby
        run: |
          bundle install

      - name: Print Ruby environment (pre-setup)
        shell: bash
        run: |
          echo "=== Ruby Environment ==="
          echo "Ruby version: $(ruby --version)"
          echo "Ruby platform: $(ruby -e 'puts RUBY_PLATFORM')"
          echo "Gem home: $(gem env home)"
          echo "Gem paths: $(gem env | grep -A 10 'EXECUTABLE')"
          echo ""
          echo "=== Rust Environment ==="
          echo "Rustc version: $(rustc -vV)"
          echo "Cargo version: $(cargo --version)"
          echo ""
          echo "=== System Info ==="
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: ${{ env.CARGO_TARGET_DIR || 'target' }}/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Vendor kreuzberg core crate
        shell: bash
        run: python3 scripts/ci/ruby/vendor-kreuzberg-core.py

      - name: Print Bundler and Ruby deps info
        shell: bash
        run: |
          echo "=== Bundler Info ==="
          bundle --version
          bundle config list || true
          echo ""
          echo "=== Installed gems (top 20) ==="
          gem list | head -20

      - name: Print Rust toolchain info (pre-build)
        shell: bash
        run: |
          echo "=== Rust Toolchain ==="
          rustup toolchain list
          rustup show
          echo ""
          echo "=== Rust Targets ==="
          rustup target list | grep installed
          echo ""
          echo "=== Rust compiler details ==="
          rustc -vV

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Platform: ${{ runner.os }}"
          echo "Building kreuzberg-ffi from source (no caching)"
          cargo build --release --package kreuzberg-ffi --verbose --message-format short 2>&1 | tee /tmp/cargo-build.log || {
            EXIT_CODE=$?
            echo ""
            echo "=== BUILD FAILED (exit code: $EXIT_CODE) ==="
            tail -100 /tmp/cargo-build.log || true
            exit "$EXIT_CODE"
          }
          echo ""
          echo "=== Build completed successfully ==="

      - name: Clean Ruby build artifacts (fix stale cargo cache)
        shell: bash
        run: |
          echo "=== Cleaning stale Ruby build artifacts ==="
          cd packages/ruby

          # Remove the tmp directory which contains stale cargo fingerprints
          if [ -d "tmp" ]; then
            echo "Removing stale tmp directory..."
            rm -rf tmp
            echo "Cleaned tmp/"
          fi

          echo "Cleanup complete"

      - name: Build Ruby gem
        shell: bash
        working-directory: packages/ruby
        run: |
          echo "=== Building Ruby Gem ==="
          echo "Platform: ${{ runner.os }}"
          echo ""
          echo "=== Ruby Build Environment ==="
          echo "Ruby version: $(ruby --version)"
          echo "Ruby platform: $(ruby -e 'puts RUBY_PLATFORM')"
          echo "RbConfig CONFIG: $(ruby -rrbconfig -e 'puts RbConfig::CONFIG["host"]')"

          # Ensure bundler can find gems (workaround for task runner CWD issues)
          bundle install --quiet

          bundle exec rake compile 2>&1 | tee /tmp/gem-build.log || {
            EXIT_CODE=$?
            echo ""
            echo "=== GEM BUILD FAILED (exit code: $EXIT_CODE) ==="
            tail -100 /tmp/gem-build.log || true
            exit "$EXIT_CODE"
          }
          bundle exec rake build
        env:
          RB_SYS_VERBOSE: "1"
          CARGO_BUILD_JOBS: "1"
          RUST_BACKTRACE: "1"

      - name: Print gem build artifacts
        if: always()
        shell: bash
        run: |
          echo "=== Gem build artifacts ==="
          cd packages/ruby
          if [ -d "pkg" ]; then
            echo "Gems built:"
            ls -lh pkg/*.gem 2>/dev/null || echo "No gem files found"
          else
            echo "ERROR: pkg directory not found"
          fi
          echo ""
          echo "=== Ruby native extension artifacts ==="
          find lib -name "*.so" -o -name "*.dll" -o -name "*.dylib" 2>/dev/null | head -10

      - name: Upload gem
        uses: actions/upload-artifact@v7
        with:
          name: gem-${{ matrix.os }}
          path: packages/ruby/pkg/*.gem
          retention-days: 7

      - name: Verify FFI build artifacts
        if: always()
        shell: bash
        run: |
          echo ""
          echo "=== FFI Build Artifacts ==="
          echo "Platform: ${{ matrix.os }}"
          echo ""
          echo "FFI artifacts:"
          echo "  target/release/:"
          ls -lh target/release/libkreuzberg_ffi* 2>/dev/null || echo "    (none found)"
          echo "  pkg-config file:"
          ls -lh crates/kreuzberg-ffi/kreuzberg-ffi.pc 2>/dev/null || echo "    (not found)"

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            /tmp/cargo-build.log
            /tmp/gem-build.log
            packages/ruby/**/mkmf.log
            packages/ruby/tmp/**/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-php:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: PHP (${{ matrix.os }}, PHP ${{ matrix.php-version }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.php == 'true')
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        # Windows excluded: ext-php-rs requires nightly Rust for abi_vectorcall feature
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        php-version: ["8.4"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        id: rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: php-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Detect partial cache hit and clean stale fingerprints
        shell: bash
        run: |
          # Check if cache was a partial hit (restored from fallback key)
          # For now, we'll do a more conservative check: always clean before build
          # since the current Cargo.lock changes frequently
          echo "Preparing clean Rust build environment..."

          # Run comprehensive fingerprint cleanup
          scripts/ci/actions/setup-rust/cleanup-fingerprints.sh

          # Also perform full clean for critical packages to ensure consistency
          cargo clean --release -p kreuzberg-ffi 2>/dev/null || true
          cargo clean --release -p kreuzberg 2>/dev/null || true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ffi
          tools: composer

      - name: Export PHP build config
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          PHP_CONFIG_BIN="$(command -v php-config || true)"
          if [ -z "$PHP_CONFIG_BIN" ]; then
            echo "php-config not found in PATH" >&2
            exit 1
          fi
          echo "PHP_CONFIG=$PHP_CONFIG_BIN" >> "$GITHUB_ENV"

      - name: Print PHP environment
        shell: bash
        run: |
          echo "=== PHP Environment ==="
          echo "PHP version: $(php --version)"
          if command -v php-config >/dev/null 2>&1; then
            echo "PHP config (php-config): $(php-config --version)"
          else
            echo "PHP config (php-config): not available"
          fi
          echo "PHP ini: $(php --ini)"
          echo "Composer version: $(composer --version)"

      - name: Install Composer dependencies
        shell: bash
        working-directory: packages/php
        run: composer install --no-progress --prefer-dist

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Export macOS PHP linker flags
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          EXTRA_FLAGS="-C link-arg=-Wl,-undefined,dynamic_lookup"
          if [ -n "${RUSTFLAGS:-}" ]; then
            echo "RUSTFLAGS=${RUSTFLAGS} ${EXTRA_FLAGS}" >> "$GITHUB_ENV"
          else
            echo "RUSTFLAGS=${EXTRA_FLAGS}" >> "$GITHUB_ENV"
          fi

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-php from source (no caching)"
          cargo build --release --package kreuzberg-php

      - name: Build PHP extension
        shell: bash
        run: |
          task php:build:ci

          # Create PHP ini file for loading the extension
          bash scripts/ci/php/create-ci-php-ini.sh

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-wasm:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: WASM (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.wasm == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    # Serialize matrix jobs to prevent concurrent cache API writes that trigger rate limits
    concurrency:
      group: ci-wasm-build-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Configure WASM C compiler
        shell: bash
        run: |
          echo "CC_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/ar" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-build-${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"
          target: wasm32-unknown-unknown
          shared-core-cache: "true"

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build or restore WASM bindings from cache
        id: wasm
        uses: kreuzberg-dev/actions/build-and-cache-binding@v1
        with:
          binding-name: wasm
          platform: ${{ matrix.os }}
          build-command: task wasm:build:ci
          cache-paths: |
            crates/kreuzberg-wasm/pkg/
          cache-version: v1
          rust-hash: "n/a"
          binding-files: |
            crates/kreuzberg-wasm/**
          dep-files: |
            Cargo.lock
            crates/kreuzberg-wasm/Cargo.toml

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-${{ matrix.target }}
          path: |
            crates/kreuzberg-wasm/pkg/*.wasm
            crates/kreuzberg-wasm/pkg/*.js
            crates/kreuzberg-wasm/pkg/*.ts
            crates/kreuzberg-wasm/pkg/package.json
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-java:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: Java (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.java == 'true' || needs.changes.outputs.ffi == 'true')
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: java-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Setup Java
        uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Maven 3.9.11
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}
          dest-dir: target/release

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Download FFI artifacts
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Set library paths for JNI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/target/release:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/target/release:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Log platform information
        shell: bash
        run: |
          echo "=== Platform Information ==="
          uname -a
          echo ""
          echo "=== Java Version ==="
          java -version 2>&1
          (java -XshowSettings:properties 2>&1 || true) | head -20
          echo ""
          echo "=== Maven Version ==="
          mvn --version
          echo ""
          echo "=== Disk Space ==="
          df -h

      - name: Build Java bindings
        shell: bash
        run: task java:build:ci

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: java-jar-${{ matrix.os }}
          path: packages/java/target/*.jar
          retention-days: 7

      - name: Upload build JVM logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: java-build-logs-${{ matrix.os }}
          path: |
            packages/java/maven-jvm.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  build-csharp:
    needs: [rust-tests, build-ffi, changes, validate, validate-rust]
    name: "Build: C# (${{ matrix.os }})"
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.csharp == 'true' || needs.changes.outputs.ffi == 'true')
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Enable symlinks on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config core.symlinks true
          git reset --hard HEAD

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: csharp-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"
          shared-core-cache: "true"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~\.nuget\packages
            ~\AppData\Local\NuGet\v3-cache
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache NuGet packages (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Download FFI artifacts
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Set library paths for .NET
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/target/release:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"
          fi

      - name: Build C# bindings
        run: task csharp:build:ci

      - name: Upload FFI library
        uses: actions/upload-artifact@v7
        with:
          name: csharp-ffi-lib-${{ matrix.os }}
          path: |
            target/release/libkreuzberg_ffi.dylib
            target/release/libkreuzberg_ffi.so
            target/release/kreuzberg_ffi.dll
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  # --- Stage 4: Test ---

  typescript-typecheck:
    name: "Validate: TypeScript Types"
    needs: [build-node, build-wasm, changes]
    if: |
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' || needs.changes.outputs.typescript == 'true' || needs.changes.outputs.wasm == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ts-typecheck

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install wasm-pack
        run: scripts/ci/wasm/install-wasm-pack.sh
        shell: bash

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Cache TypeScript build artifacts
        uses: actions/cache@v5
        with:
          path: |
            crates/kreuzberg-wasm/pkg/
            crates/kreuzberg-node/*.node
            crates/kreuzberg-node/dist/
            packages/typescript/core/dist/
            packages/wasm/dist/
          key: ts-typecheck-v1-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/kreuzberg-wasm/src/**', 'crates/kreuzberg-node/src/**', 'crates/kreuzberg-node/typescript/**', 'packages/typescript/core/typescript/**') }}
          restore-keys: |
            ts-typecheck-v1-${{ runner.os }}-

      - name: Run TypeScript type checking
        run: task typescript:typecheck:check

  test-python:
    name: "Test: Python (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-python]
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            coverage: true
          - os: ubuntu-24.04-arm
            coverage: false
          - os: macos-latest
            coverage: false
          - os: windows-latest
            coverage: false
    runs-on: ${{ matrix.os }}
    env:
      HF_HOME: ~/.cache/huggingface
      TRANSFORMERS_CACHE: ~/.cache/huggingface
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before tests (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: scripts/ci/python/free-disk-space.sh

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: test-py-3.13

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.os == 'ubuntu-latest' && 'wheels-linux-x86_64' || matrix.os == 'ubuntu-24.04-arm' && 'wheels-linux-arm64' || matrix.os == 'macos-latest' && 'wheels-macos-arm64' || 'wheels-windows-x86_64' }}
          path: dist/

      - name: Install wheel
        shell: bash
        run: scripts/ci/python/install-wheel.sh

      - name: Install SpaCy model (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: scripts/ci/python/install-spacy-model.sh

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Setup PaddleOCR Models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Tesseract tessdata (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /c/tess/tessdata
          echo "Downloading tessdata files..."
          curl -fsSL -o /c/tess/tessdata/eng.traineddata \
            "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata"
          curl -fsSL -o /c/tess/tessdata/osd.traineddata \
            "https://github.com/tesseract-ocr/tessdata_fast/raw/main/osd.traineddata"
          echo "Tessdata files downloaded to C:/tess/tessdata"
          ls -la /c/tess/tessdata/

      - name: Run Python tests
        shell: bash
        run: task python:test:ci

      - name: Run E2E tests
        shell: bash
        env:
          PYTEST_TIMEOUT: 300
        run: task python:e2e:test

  test-node:
    name: "Test: TypeScript (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-node]
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            coverage: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            coverage: false
          - os: macos-latest
            target: aarch64-apple-darwin
            coverage: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            coverage: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: packages/typescript

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Setup PaddleOCR Models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Download Node bindings
        uses: actions/download-artifact@v8
        with:
          name: napi-${{ matrix.target }}
          path: crates/kreuzberg-node/

      - name: Unpack and install Node bindings
        shell: bash
        run: |
          set -x
          time scripts/ci/node/unpack-bindings.sh
          set +x

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run TypeScript tests (Node.js)
        shell: bash
        env:
          VERBOSE: "1"
          DEBUG: "kreuzberg*"
        run: |
          set -x
          time task node:test:ci
          set +x

      - name: Run E2E tests
        shell: bash
        env:
          VERBOSE: "1"
          DEBUG: "kreuzberg*"
        run: |
          set -x
          time task node:e2e:test
          set +x

  test-ruby:
    name: "Test: Ruby (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-ruby]
    timeout-minutes: 180
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ruby-test-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"

      - name: Detect partial cache hit and clean stale fingerprints
        shell: bash
        run: |
          if [ -d "target" ]; then
            echo "Cleaning stale build artifacts to prevent fingerprint errors"
            cargo clean --release -p kreuzberg-ffi 2>/dev/null || true
            cargo clean --release -p kreuzberg 2>/dev/null || true
            if [ -d "packages/ruby/tmp" ]; then
              echo "Cleaning rb_sys build directory: packages/ruby/tmp"
              rm -rf packages/ruby/tmp
            fi
          else
            echo "No target directory found, skipping cache cleanup"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: packages/ruby

      - name: Set BUNDLE_GEMFILE (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "BUNDLE_GEMFILE=${{ github.workspace }}/packages/ruby/Gemfile" >> "$GITHUB_ENV"

      - name: Install Ruby dependencies
        shell: bash
        working-directory: packages/ruby
        run: bundle install

      - name: Install rb_sys build helper
        run: gem install rb_sys -v "~> 0.9"
        shell: bash

      - name: Download gem
        uses: actions/download-artifact@v8
        with:
          name: gem-${{ matrix.os }}
          path: packages/ruby/pkg/

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: ${{ env.CARGO_TARGET_DIR || 'target' }}/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Install gem
        shell: bash
        run: scripts/ci/ruby/install-gem.sh

      - name: Vendor kreuzberg core for native extension
        shell: bash
        run: python3 scripts/ci/ruby/vendor-kreuzberg-core.py

      - name: Build local native extension
        shell: bash
        run: scripts/ci/ruby/compile-extension.sh

      - name: Build kreuzberg CLI binary
        shell: bash
        run: cargo build --release --package kreuzberg-cli

      - name: Run Ruby tests
        shell: bash
        run: task ruby:test:ci

      - name: Set library paths for E2E tests
        shell: bash
        run: |
          source scripts/lib/library-paths.sh
          setup_onnx_paths
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "DYLD_LIBRARY_PATH=${DYLD_LIBRARY_PATH:-}"
            echo "DYLD_FALLBACK_LIBRARY_PATH=${DYLD_FALLBACK_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: task ruby:e2e:test

  test-php:
    name: "Test: PHP (${{ matrix.os }}, PHP 8.4)"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-php]
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Rust
        id: rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: php-test-${{ matrix.os }}
          use-sccache: "true"
          report-stats: "true"

      - name: Detect partial cache hit and clean stale fingerprints
        shell: bash
        run: |
          echo "Preparing clean Rust build environment..."
          scripts/ci/actions/setup-rust/cleanup-fingerprints.sh
          cargo clean --release -p kreuzberg-ffi 2>/dev/null || true
          cargo clean --release -p kreuzberg 2>/dev/null || true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ffi
          tools: composer

      - name: Install Composer dependencies
        shell: bash
        working-directory: packages/php
        run: composer install --no-progress --prefer-dist

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Export macOS PHP linker flags
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          EXTRA_FLAGS="-C link-arg=-Wl,-undefined,dynamic_lookup"
          if [ -n "${RUSTFLAGS:-}" ]; then
            echo "RUSTFLAGS=${RUSTFLAGS} ${EXTRA_FLAGS}" >> "$GITHUB_ENV"
          else
            echo "RUSTFLAGS=${EXTRA_FLAGS}" >> "$GITHUB_ENV"
          fi

      - name: Build kreuzberg-php
        id: ffi
        shell: bash
        run: |
          echo "=== Building kreuzberg-php ==="
          cargo build --release --package kreuzberg-php

      - name: Build PHP extension
        shell: bash
        run: task php:build:ci

      - name: Run PHP tests
        shell: bash
        run: task php:test:ci

      - name: Build kreuzberg CLI binary
        shell: bash
        run: cargo build --release --package kreuzberg-cli

      - name: Run E2E tests
        shell: bash
        run: task php:e2e:test

  test-go:
    name: "Test: Go (${{ matrix.os }})"
    if: |
      always() && !cancelled() &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.go == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.ffi == 'true')
    needs: [build-ffi, changes]
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Debug build environment
        if: always()
        shell: bash
        run: scripts/ci/go/debug-build-environment.sh

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}
          dest-dir: "target/release"

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: ffi-download

      - name: Move FFI library to correct location
        shell: bash
        run: scripts/ci/go/move-downloaded-ffi-library.sh

      - name: Verify FFI library location and permissions
        shell: bash
        run: scripts/ci/go/verify-ffi-library.sh

      - name: Make FFI library executable (Unix)
        if: runner.os != 'Windows'
        run: scripts/ci/go/make-ffi-executable-unix.sh

      - name: Setup Tesseract Cache
        uses: ./.github/actions/setup-tesseract-cache
        with:
          label: ${{ runner.os }}-tesseract-${{ env.PDFIUM_VERSION }}
          enable-cache: "true"

      - name: Setup Go CGO environment
        uses: kreuzberg-dev/actions/setup-go-cgo-env@v1
        with:
          ffi-lib-dir: "target/release"
          enable-rpath: "true"

      - name: Set library paths for test execution
        shell: bash
        run: scripts/ci/go/export-library-paths-for-tests.sh

      - name: Verify CGO configuration
        shell: bash
        run: scripts/ci/go/verify-cgo-config.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run Go tests
        shell: bash
        run: |
          echo "::group::Go Test Execution"
          TEST_OUTPUT_FILE=$(mktemp)
          set +e
          time task go:test:ci -v 2>&1 | tee "$TEST_OUTPUT_FILE"
          GO_TEST_EXIT=${PIPESTATUS[0]}
          set -e
          echo "Go test exit code: $GO_TEST_EXIT"
          if [ "$GO_TEST_EXIT" -eq 0 ]; then
            echo "Tests passed with exit code 0"
            rm -f "$TEST_OUTPUT_FILE"
            echo "::endgroup::"
            exit 0
          else
            if grep -qE "^--- FAIL:" "$TEST_OUTPUT_FILE"; then
              echo "::error::Tests failed (found individual test FAIL in output)"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit 1
            elif grep -qE "^ok[[:space:]]|^--- PASS:" "$TEST_OUTPUT_FILE"; then
              echo "::warning::Exit code $GO_TEST_EXIT detected but all individual tests passed - known PDFium cleanup issue"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit 0
            else
              echo "::error::Tests failed with exit code $GO_TEST_EXIT"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit "$GO_TEST_EXIT"
            fi
          fi
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH }}
          CGO_ENABLED: ${{ env.CGO_ENABLED }}
          CGO_CFLAGS: ${{ env.CGO_CFLAGS }}
          CGO_LDFLAGS: ${{ env.CGO_LDFLAGS }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}

      - name: Install golangci-lint
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run Go lint checks
        shell: bash
        run: task go:lint:check
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH }}
          CGO_ENABLED: ${{ env.CGO_ENABLED }}
          CGO_CFLAGS: ${{ env.CGO_CFLAGS }}
          CGO_LDFLAGS: ${{ env.CGO_LDFLAGS }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}

      - name: Generate Go E2E tests
        shell: bash
        run: |
          echo "::group::E2E Test Generation"
          time task go:e2e:generate -v 2>&1
          echo "::endgroup::"

      - name: Run E2E tests
        shell: bash
        run: |
          echo "::group::E2E Test Execution"
          TEST_OUTPUT_FILE=$(mktemp)
          set +e
          time task go:e2e:test -v 2>&1 | tee "$TEST_OUTPUT_FILE"
          E2E_TEST_EXIT=${PIPESTATUS[0]}
          set -e
          echo "E2E test exit code: $E2E_TEST_EXIT"
          if [ "$E2E_TEST_EXIT" -eq 0 ]; then
            echo "E2E tests passed with exit code 0"
            rm -f "$TEST_OUTPUT_FILE"
            echo "::endgroup::"
            exit 0
          else
            if grep -qE "^--- FAIL:" "$TEST_OUTPUT_FILE"; then
              echo "::error::E2E tests failed"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit 1
            elif grep -qE "^ok[[:space:]]|^--- PASS:" "$TEST_OUTPUT_FILE"; then
              echo "::warning::Exit code $E2E_TEST_EXIT detected but all E2E tests passed - known PDFium cleanup issue"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit 0
            else
              echo "::error::E2E tests failed with exit code $E2E_TEST_EXIT"
              rm -f "$TEST_OUTPUT_FILE"
              echo "::endgroup::"
              exit "$E2E_TEST_EXIT"
            fi
          fi
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH }}
          CGO_ENABLED: ${{ env.CGO_ENABLED }}
          CGO_CFLAGS: ${{ env.CGO_CFLAGS }}
          CGO_LDFLAGS: ${{ env.CGO_LDFLAGS }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}

  test-java:
    name: "Test: Java (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-java]
    timeout-minutes: 240
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      KREUZBERG_FFI_DIR: ${{ github.workspace }}/target/release
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}
          dest-dir: target/release

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Setup PaddleOCR Models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Setup Java
        uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Maven 3.9.11
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Download JAR
        uses: actions/download-artifact@v8
        with:
          name: java-jar-${{ matrix.os }}
          path: .

      - name: Download FFI library
        uses: actions/download-artifact@v8
        with:
          name: ffi-${{ matrix.os }}
          path: .

      - name: Prepare JVM crash logs
        shell: bash
        run: mkdir -p packages/java/target/jvm-crash

      - name: Set library paths for JNI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/target/release:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/target/release:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Run Java tests
        env:
          JAVA_TOOL_OPTIONS: >-
            -XX:ErrorFile=${{ github.workspace }}/packages/java/target/jvm-crash/hs_err_pid%p.log
            -XX:+UnlockDiagnosticVMOptions
            -XX:+LogVMOutput
            -XX:LogFile=${{ github.workspace }}/packages/java/target/jvm-crash/jvm.log
            -XX:+HeapDumpOnOutOfMemoryError
            -XX:HeapDumpPath=${{ github.workspace }}/packages/java/target/jvm-crash/heapdump.hprof
            -Xlog:os=info
          RUST_BACKTRACE: full
        run: task java:test:ci

      - name: Run E2E tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: task -vv java:e2e:test

      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: task -vv java:e2e:test

      - name: Upload Java unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: java-unit-reports-${{ matrix.os }}
          path: packages/java/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JVM crash logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: java-crash-logs-${{ matrix.os }}
          path: packages/java/target/jvm-crash
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Java E2E test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: java-e2e-reports-${{ matrix.os }}
          path: e2e/java/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

