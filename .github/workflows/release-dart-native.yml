name: Release Dart Native Library

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ext: dylib
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: packages/dart/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dart/rust

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract leptonica onnxruntime

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libleptonica-dev

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: libkreuzberg_dart-${{ matrix.target }}
          path: target/release/libkreuzberg_dart.${{ matrix.ext }}

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: libkreuzberg_dart-*
          merge-multiple: true
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in libkreuzberg_dart-*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f"
          done
