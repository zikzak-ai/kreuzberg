name: CI GPU

on:
  push:
    branches: [main]
    paths:
      - "crates/kreuzberg/src/**"
      - "crates/kreuzberg/tests/gpu_acceleration.rs"
      - "crates/kreuzberg-paddle-ocr/**"
      - "test_documents/**"
      - ".github/workflows/ci-gpu.yaml"
      - ".github/actions/setup-paddle-ocr-models/**"
      - ".github/actions/install-system-deps/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/kreuzberg/src/**"
      - "crates/kreuzberg/tests/gpu_acceleration.rs"
      - "crates/kreuzberg-paddle-ocr/**"
      - "test_documents/**"
      - ".github/workflows/ci-gpu.yaml"
      - ".github/actions/setup-paddle-ocr-models/**"
      - ".github/actions/install-system-deps/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-gpu
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  ORT_VERSION: "1.24.2"

permissions:
  contents: read

jobs:
  build:
    name: "Build test binary"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gpu-build-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            gpu-build-${{ runner.os }}-

      - name: Build GPU test binary
        run: |
          set -o pipefail
          cargo test -p kreuzberg \
            --features "paddle-ocr,layout-detection,embeddings,pdf,ocr,ort-dynamic" \
            --test gpu_acceleration \
            --no-run --message-format=json 2> /tmp/cargo-stderr.log \
            | jq -r 'select(.executable != null) | .executable' \
            | head -1 > /tmp/test-binary-path.txt
          if [ ! -s /tmp/test-binary-path.txt ]; then
            echo "::error::cargo test produced no executable; stderr below:"
            cat /tmp/cargo-stderr.log
            exit 1
          fi
          TEST_BIN=$(cat /tmp/test-binary-path.txt)
          echo "Test binary: $TEST_BIN"
          cp "$TEST_BIN" gpu-acceleration-test
          chmod +x gpu-acceleration-test

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: gpu-test-binary
          path: gpu-acceleration-test
          retention-days: 1

  gpu-tests:
    name: "GPU Tests (CUDA)"
    needs: build
    runs-on: runner-gpu-l4
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GPU
        run: |
          nvidia-smi || {
            echo "ERROR: nvidia-smi failed — no GPU detected"
            exit 1
          }
          echo "GPU detected:"
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader

      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: gpu-test-binary

      - name: Download ONNX Runtime (GPU/CUDA)
        run: |
          ORT_DIR="$RUNNER_TEMP/onnxruntime"
          ORT_NAME="onnxruntime-linux-x64-gpu-${ORT_VERSION}"
          ARCHIVE="${ORT_NAME}.tgz"

          if [ ! -d "$ORT_DIR/$ORT_NAME" ]; then
            echo "Downloading ONNX Runtime ${ORT_VERSION} (GPU)"
            curl -fsSL --retry 3 --retry-delay 5 \
              -o "$RUNNER_TEMP/$ARCHIVE" \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/$ARCHIVE"
            mkdir -p "$ORT_DIR"
            tar -xzf "$RUNNER_TEMP/$ARCHIVE" -C "$ORT_DIR"
            rm -f "$RUNNER_TEMP/$ARCHIVE"
          fi

          ORT_LIB="$ORT_DIR/$ORT_NAME/lib"
          echo "ORT_DYLIB_PATH=${ORT_LIB}/libonnxruntime.so" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${ORT_LIB}:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "ONNX Runtime GPU libraries staged at ${ORT_LIB}"
          ls -la "${ORT_LIB}"/libonnxruntime*.so*

      - name: Setup PaddleOCR models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Run GPU tests
        run: |
          chmod +x gpu-acceleration-test
          ./gpu-acceleration-test --ignored --nocapture
        env:
          RUST_LOG: "kreuzberg=debug"
          TEST_DOCUMENTS_DIR: ${{ github.workspace }}/test_documents
