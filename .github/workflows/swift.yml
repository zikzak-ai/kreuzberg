name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/swift
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - name: Build Swift package
        run: swift build
      - name: Run tests
        run: swift test
