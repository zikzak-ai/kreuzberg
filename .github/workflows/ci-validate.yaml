name: CI Validate

on:
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "scripts/**"
      - "docs/**"
      - ".github/**"
      - ".cargo/config.toml"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "biome.json"
      - "pyproject.toml"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "scripts/**"
      - "docs/**"
      - ".github/**"
      - ".cargo/config.toml"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "biome.json"
      - "pyproject.toml"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  ORT_VERSION: "1.24.1"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  BUILD_PROFILE: "ci"

jobs:
  validate:
    name: Validate (Lint & Format)
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Show initial disk space
        run: scripts/ci/validate/show-disk-space.sh "Initial disk space"
        shell: bash

      - name: Free disk space before setup
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: validate

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: validate

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: packages/ruby
        env:
          BUNDLE_LOCKFILE_CHECKSUMS: "false"

      - name: Install E2E Ruby dependencies
        run: cd e2e/ruby && bundle install
        shell: bash

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('styler', 'lintr', 'testthat', 'jsonlite', 'withr'), repos = 'https://cloud.r-project.org')"
        shell: bash

      - name: Setup Java
        uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: packages/go/v4/go.sum

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer

      - name: Install PHP dependencies
        run: |
          cd packages/php
          composer install
        shell: bash

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Elixir dependencies
        run: |
          cd packages/elixir
          mix deps.get
        shell: bash

      - name: Cache TypeScript build artifacts
        uses: actions/cache@v5
        with:
          path: |
            crates/kreuzberg-wasm/pkg/
            crates/kreuzberg-node/*.node
            crates/kreuzberg-node/dist/
            packages/typescript/core/dist/
            packages/wasm/dist/
          key: ts-build-v1-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/kreuzberg-wasm/src/**', 'crates/kreuzberg-node/src/**', 'crates/kreuzberg-node/typescript/**', 'packages/typescript/core/typescript/**') }}
          restore-keys: |
            ts-build-v1-${{ runner.os }}-

      - name: Check disk space before tool installations
        run: scripts/ci/validate/show-disk-space.sh "Disk space before tool installations"
        shell: bash

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Install wasm-pack
        run: scripts/ci/wasm/install-wasm-pack.sh
        shell: bash

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Check disk space before lint
        run: scripts/ci/validate/show-disk-space.sh "Disk space before lint"
        shell: bash

      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      - name: Run prek hooks
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files

      - name: Build snippet-runner
        run: cargo build --release -p snippet-runner

      - name: Validate documentation snippets
        run: ./target/release/snippet-runner validate --snippets docs/snippets --reference docs/reference --level syntax --timeout 120

      - name: Check final disk space
        if: always()
        run: scripts/ci/validate/show-disk-space.sh "Final disk space"
        shell: bash

      - name: Cleanup build artifacts after lint
        if: always()
        run: scripts/ci/validate/cleanup-after-lint.sh
        shell: bash

  typescript-typecheck:
    name: TypeScript Type Check
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ts-typecheck

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install wasm-pack
        run: scripts/ci/wasm/install-wasm-pack.sh
        shell: bash

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Cache TypeScript build artifacts
        uses: actions/cache@v5
        with:
          path: |
            crates/kreuzberg-wasm/pkg/
            crates/kreuzberg-node/*.node
            crates/kreuzberg-node/dist/
            packages/typescript/core/dist/
            packages/wasm/dist/
          key: ts-typecheck-v1-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/kreuzberg-wasm/src/**', 'crates/kreuzberg-node/src/**', 'crates/kreuzberg-node/typescript/**', 'packages/typescript/core/typescript/**') }}
          restore-keys: |
            ts-typecheck-v1-${{ runner.os }}-

      - name: Run TypeScript type checking
        run: task typescript:typecheck:check
