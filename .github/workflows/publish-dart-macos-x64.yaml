name: Publish Dart macOS x64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v5.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Dart macOS x86_64 native
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: x86_64-apple-darwin

      - name: Build
        run: cargo build -p kreuzberg-dart --release --target x86_64-apple-darwin

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAGE="kreuzberg-dart-macos-x86_64"
          mkdir -p "$STAGE"
          cp "target/x86_64-apple-darwin/release/libkreuzberg_dart.dylib" "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          gh release upload ${{ inputs.tag }} "${STAGE}.tar.gz" --clobber
