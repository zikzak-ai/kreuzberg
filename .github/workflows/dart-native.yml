name: Build Dart Native Library

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: packages/dart/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dart/rust

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract leptonica onnxruntime

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libleptonica-dev

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: libkreuzberg_dart-${{ matrix.target }}
          path: ../../../target/release/libkreuzberg_dart.*

  test:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dart
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dart/rust
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      - name: Build native lib
        run: cargo build --release
        working-directory: packages/dart/rust
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test
