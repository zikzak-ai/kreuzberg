name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to benchmark"
        required: false
        default: "main"
        type: string
      timeout:
        description: "Timeout per document in seconds"
        required: false
        default: "900"
        type: string

env:
  ITERATIONS: "3"
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  ORT_VERSION: "1.24.1"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  RUNNER_TOOL_CACHE: /tmp/runner-toolcache
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  RUSTFLAGS: "-C strip=symbols"
  MEASURE_QUALITY: "true"
  OCR_ENABLED: "true"
  RUN_OCR_BENCHMARKS: "true"
  GROUND_TRUTH_DIR: "test_documents/ground_truth"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-ground-truth:
    name: Validate Ground Truth
    runs-on: runner-small
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validate ground truth organization
        run: python tools/benchmark-harness/scripts/validate_ground_truth.py

  setup:
    name: Build harness + native libs
    needs: validate-ground-truth
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      artifact-name: benchmarks-target
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Ensure benchmark harness exists
        run: scripts/benchmarks/ensure-benchmark-harness-exists.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-setup
          use-sccache: 'true'
          report-stats: 'true'

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium runtime
        run: scripts/download_pdfium_runtime.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Cache benchmark harness
        uses: ./.github/actions/cache-benchmark-harness
        with:
          build-profile: release

      - name: Build FFI library
        uses: kreuzberg-dev/actions/build-rust-ffi@v1.0.0 # v1.0.0
        with:
          crate-name: kreuzberg-ffi
          build-profile: release

      - name: Build kreuzberg-extract binary
        run: cargo build --release -p benchmark-harness --bin kreuzberg-extract

      - name: Log disk space before artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space before artifact upload"

      - name: Upload build artifacts (harness binary + FFI shared lib)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-target
          path: |
            target/release/benchmark-harness
            target/release/kreuzberg-extract
            target/release/libkreuzberg_ffi.so
            target/release/libkreuzberg_ffi.dylib
            target/release/kreuzberg_ffi.dll
            target/release/libkreuzberg_ffi.a
          retention-days: 7
          if-no-files-found: warn

      - name: Upload benchmark harness binary (for third-party jobs)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-harness-binary
          path: |
            target/release/benchmark-harness
          retention-days: 7

      - name: Log disk space after artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space after artifact upload"

  bench-native:
    name: kreuzberg-rust (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-native
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-rust
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-rust-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-native-paddle:
    name: kreuzberg-rust-paddle (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-native-paddle
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup PaddleOCR models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-rust-paddle
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-rust-paddle-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-python:
    name: kreuzberg-python (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-python
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1.0.0 # v1.0.0
        with:
          python-version: "3.11"
          cache-prefix: benchmark-python

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Build Python bindings
        run: task python:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-python
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-python-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-node:
    name: kreuzberg-node (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-node
          use-sccache: 'false'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1.0.0 # v1.0.0

      - name: Verify Node setup
        run: scripts/ci/benchmarks/verify-node-setup.sh "Node setup (async)"

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Build Node bindings and install locally
        env:
          TARGET: x86_64-unknown-linux-gnu
        run: task node:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-node
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-node-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-wasm:
    name: kreuzberg-wasm (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-wasm
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1.0.0 # v1.0.0

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1.0.0 # v1.0.0

      - name: Build WASM bindings
        run: task wasm:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-wasm
          MODE: ${{ matrix.mode }}
          ITERATIONS: "1"
          TIMEOUT: "120"
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-wasm-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-ruby:
    name: kreuzberg-ruby (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-ruby
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Prepare runner tool cache
        run: |
          sudo mkdir -p /opt/hostedtoolcache
          sudo chmod 777 /opt/hostedtoolcache

      - name: Setup Ruby
        uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6 # v1.292.0
        with:
          ruby-version: "3.2"

      - name: Install clang (for bindgen / rb-sys)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev

      - name: Export LIBCLANG_PATH
        run: |
          set -euo pipefail
          LIBCLANG_DIR=""
          for dir in /usr/lib/llvm-*/lib /usr/lib/x86_64-linux-gnu /usr/lib64; do
            if ls "$dir"/libclang*.so* &>/dev/null; then
              LIBCLANG_DIR="$dir"
              break
            fi
          done
          if [[ -z "$LIBCLANG_DIR" ]]; then
            echo "::error::Could not locate libclang shared library"
            exit 1
          fi
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> "$GITHUB_ENV"
          echo "Using LIBCLANG_PATH=$LIBCLANG_DIR"

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-ffi from source (with sccache fallback)"
          scripts/ci/actions/setup-rust/build-with-sccache-fallback.sh cargo build --release --package kreuzberg-ffi

      - name: Set library paths for FFI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/crates/kreuzberg-ffi:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Vendor kreuzberg core for Ruby
        run: python3 scripts/ci/ruby/vendor-kreuzberg-core.py

      - name: Build Ruby native gem
        env:
          PLATFORM: x86_64-linux
        run: task ruby:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-ruby
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-ruby-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

