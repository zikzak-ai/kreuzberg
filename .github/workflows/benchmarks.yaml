        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
        with:
          cache-key-prefix: benchmarks-php
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: "8.5"
          extensions: ffi

      - name: Install clang (for bindgen / ext-php-rs)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev

      - name: Export LIBCLANG_PATH
        run: |
          set -euo pipefail
          # Search common llvm lib paths directly (ldconfig may not index them)
          LIBCLANG_DIR=""
          for dir in /usr/lib/llvm-*/lib /usr/lib/x86_64-linux-gnu /usr/lib64; do
            if ls "$dir"/libclang*.so* &>/dev/null; then
              LIBCLANG_DIR="$dir"
              break
            fi
          done
          if [[ -z "$LIBCLANG_DIR" ]]; then
            echo "::error::Could not locate libclang shared library"
            exit 1
          fi
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> "$GITHUB_ENV"
          echo "Using LIBCLANG_PATH=$LIBCLANG_DIR"

      - name: Verify libclang present
        run: |
          clang --version
          echo "LIBCLANG_PATH=${LIBCLANG_PATH}"
          ls -la "${LIBCLANG_PATH}"/libclang*.so*

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1.0.0 # v1.0.0

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-ffi from source (with sccache fallback)"
          scripts/ci/actions/setup-rust/build-with-sccache-fallback.sh cargo build --release --package kreuzberg-ffi

      - name: Set library paths for FFI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/crates/kreuzberg-ffi:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Build PHP bindings
        run: task php:build:ci

      - name: Install Composer dependencies
        working-directory: packages/php
        run: composer install --no-progress --prefer-dist

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-php
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-kreuzberg-php-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

