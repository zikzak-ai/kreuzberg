          path: benchmark-results/
          retention-days: 30

  bench-go:
    name: kreuzberg-go (${{ matrix.mode }})
    needs: setup
    runs-on: runner-large
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        run: scripts/ci/benchmarks/free-disk-space.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1.0.0 # v1.0.0

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1.0.0 # v1.0.0
