name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to benchmark"
        required: false
        default: "main"
        type: string
      timeout:
        description: "Timeout per document in seconds"
        required: false
        default: "900"
        type: string

env:
  ITERATIONS: "3"
  TIKA_VERSION: "3.2.3"
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  ORT_VERSION: "1.24.2"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  RUSTFLAGS: "-C strip=symbols"
  MEASURE_QUALITY: "true"
  OCR_ENABLED: "true"
  RUN_OCR_BENCHMARKS: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GROUND_TRUTH_DIR: "test_documents/ground_truth"

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Build harness + native libs
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      artifact-name: benchmarks-target
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Ensure benchmark harness exists
        run: scripts/benchmarks/ensure-benchmark-harness-exists.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-setup
          use-sccache: 'true'
          report-stats: 'true'

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium runtime
        run: scripts/download_pdfium_runtime.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Cache benchmark harness
        uses: ./.github/actions/cache-benchmark-harness
        with:
          build-profile: release

      - name: Build FFI library
        uses: kreuzberg-dev/actions/build-rust-ffi@v1
        with:
          crate-name: kreuzberg-ffi
          build-profile: release

      - name: Build kreuzberg-extract binary
        run: cargo build --release -p benchmark-harness --bin kreuzberg-extract

      - name: Validate ground truth
        run: cargo run --release -p benchmark-harness -- validate-gt --fixtures tools/benchmark-harness/fixtures/

      - name: Log disk space before artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space before artifact upload"

      - name: Upload build artifacts (harness binary + FFI shared lib)
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-target
          path: |
            target/release/benchmark-harness
            target/release/kreuzberg-extract
            target/release/libkreuzberg_ffi.so
            target/release/libkreuzberg_ffi.dylib
            target/release/kreuzberg_ffi.dll
            target/release/libkreuzberg_ffi.a
          retention-days: 7
          if-no-files-found: warn

      - name: Upload benchmark harness binary (for third-party jobs)
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-harness-binary
          path: |
            target/release/benchmark-harness
          retention-days: 7

      - name: Log disk space after artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space after artifact upload"

  bench-native:
    name: kreuzberg-rust (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-native
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-rust
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-rust-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-native-paddle:
    name: kreuzberg-rust-paddle (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-native-paddle
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Setup PaddleOCR models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-rust-paddle
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-rust-paddle-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-python:
    name: kreuzberg-python (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      RUSTUP_TOOLCHAIN: stable
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-python
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.11"
          cache-prefix: benchmark-python

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build Python bindings
        env:
          RUSTUP_TOOLCHAIN: stable
        run: task python:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-python
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-python-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-node:
    name: kreuzberg-node (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-node
          use-sccache: 'false'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Verify Node setup
        run: scripts/ci/benchmarks/verify-node-setup.sh "Node setup (async)"

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build Node bindings and install locally
        env:
          TARGET: aarch64-unknown-linux-gnu
          RUSTUP_TOOLCHAIN: stable
        run: task node:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-node
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-node-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-wasm:
    name: kreuzberg-wasm (${{ matrix.mode }})
    needs: setup
    # WASM runs on x86 — Node.js V8 WASM runtime has initialization issues on ARM64 Linux
    # that cause extractions to hang indefinitely. Works fine on x86 and macOS ARM.
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-wasm
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Build or cache benchmark harness
        uses: ./.github/actions/cache-benchmark-harness
        with:
          build-profile: release

      - name: Build WASM bindings
        env:
          RUSTUP_TOOLCHAIN: stable
        run: task wasm:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-wasm
          MODE: ${{ matrix.mode }}
          ITERATIONS: "1"
          TIMEOUT: "300"
          READY_TIMEOUT: "120"
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-wasm-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-ruby:
    name: kreuzberg-ruby (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-ruby
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-ffi from source (with sccache fallback)"
          scripts/ci/actions/setup-rust/build-with-sccache-fallback.sh cargo build --release --package kreuzberg-ffi

      - name: Set library paths for FFI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/crates/kreuzberg-ffi:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Vendor kreuzberg core for Ruby
        run: python3 scripts/ci/ruby/vendor-kreuzberg-core.py

      - name: Build Ruby native gem
        env:
          PLATFORM: aarch64-linux
          RUSTUP_TOOLCHAIN: stable
        run: task ruby:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-ruby
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-ruby-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-r:
    name: kreuzberg-r (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-r
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('jsonlite', 'testthat', 'withr'), repos = 'https://cloud.r-project.org')"
        shell: bash

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Vendor kreuzberg core for R
        run: python3 scripts/ci/r/vendor-kreuzberg-core.py

      - name: Build R native package
        env:
          RUSTUP_TOOLCHAIN: stable
        run: task r:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-r
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-r-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-go:
    name: kreuzberg-go (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-go
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: packages/go/v4/go.sum

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        id: ffi
        shell: bash
        run: |
          echo "=== Building FFI Library ==="
          echo "Building kreuzberg-ffi from source (with sccache fallback)"
          scripts/ci/actions/setup-rust/build-with-sccache-fallback.sh cargo build --release --package kreuzberg-ffi

      - name: Set library paths for FFI
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/crates/kreuzberg-ffi:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Prime Go modules
        working-directory: packages/go/v4
        run: go mod download

      - name: Prime benchmark Go modules
        working-directory: tools/benchmark-harness/scripts
        run: go mod download

      - name: Build Go bindings
        env:
          RUSTUP_TOOLCHAIN: stable
        run: task go:build:bindings

      - name: Run benchmark
        env:
          FRAMEWORK: kreuzberg-go
          MODE: ${{ matrix.mode }}
          ITERATIONS: ${{ env.ITERATIONS }}
          KREUZBERG_BENCHMARK_DEBUG: "true"
          TIMEOUT: ${{ github.event.inputs.timeout }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-kreuzberg-go-${{ matrix.mode }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-java:
    name: kreuzberg-java (${{ matrix.mode }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        mode: [single-file, batch]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Free disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-java
          use-sccache: 'true'
          report-stats: 'true'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Setup Java
        uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Maven
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
