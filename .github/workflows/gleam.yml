name: Gleam

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gleam
    steps:
      - uses: actions/checkout@v4
      - name: Set up BEAM (Erlang/Elixir)
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.4"
      - name: Build Gleam project
        run: gleam build
      - name: Run tests
        run: gleam test
