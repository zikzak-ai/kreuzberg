name: CI WASM

on:
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/workflows/ci-wasm.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/kreuzberg/**'
      - 'crates/kreuzberg-wasm/**'
      - 'crates/kreuzberg-tesseract/**'
      - 'packages/typescript/core/**'
      - 'packages/wasm/**'
      - 'e2e/wasm/**'
      - 'e2e/wasm-deno/**'
      - 'e2e/wasm-workers/**'
      - 'test_documents/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'scripts/ci/wasm/**'
      - 'scripts/ci/cache/**'
      - 'scripts/ci/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/workflows/ci-wasm.yaml'
      - '.cargo/config.toml'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/kreuzberg/**'
      - 'crates/kreuzberg-wasm/**'
      - 'crates/kreuzberg-tesseract/**'
      - 'packages/typescript/core/**'
      - 'packages/wasm/**'
      - 'e2e/wasm/**'
      - 'e2e/wasm-deno/**'
      - 'e2e/wasm-workers/**'
      - 'test_documents/**'
      - 'fixtures/**'
      - 'tools/e2e-generator/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'scripts/ci/wasm/**'
      - 'scripts/ci/cache/**'
      - 'scripts/ci/actions/**'
  workflow_dispatch:

concurrency:
  group: ci-wasm-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  PDFIUM_WASM_VERSION: "7623"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  BUILD_PROFILE: "ci"

jobs:

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    # Serialize matrix jobs to prevent concurrent cache API writes that trigger rate limits
    concurrency:
      group: ci-wasm-unit-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            matrix-index: 1
          - os: macos-latest
            matrix-index: 2
          - os: windows-latest
            matrix-index: 3
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Serialize matrix job execution (prevent cache API rate limits)
        shell: bash
        run: |
          MATRIX_INDEX=${{ matrix.matrix-index }}
          if [ "$MATRIX_INDEX" -gt 1 ]; then
            DELAY_SECONDS=$(((MATRIX_INDEX - 1) * 300))
            echo "Matrix index: $MATRIX_INDEX — delaying $DELAY_SECONDS seconds to prevent cache API rate limits"
            sleep "$DELAY_SECONDS"
          fi

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-test-${{ matrix.os }}
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Clippy (kreuzberg-wasm)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: cargo clippy -p kreuzberg-wasm --target wasm32-unknown-unknown -- -D warnings

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run WASM tests
        shell: bash
        working-directory: crates/kreuzberg-wasm
        run: pnpm run build --minify && pnpm test
        env:
          RUST_BACKTRACE: 1

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1


  build-wasm-targets:
    name: Build WASM (${{ matrix.os }})
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    # Serialize matrix jobs to prevent concurrent cache API writes that trigger rate limits
    concurrency:
      group: ci-wasm-build-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            matrix-index: 1
          - os: macos-latest
            target: aarch64-apple-darwin
            matrix-index: 2
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            matrix-index: 3
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Serialize matrix job execution (prevent cache API rate limits)
        shell: bash
        run: |
          MATRIX_INDEX=${{ matrix.matrix-index }}
          if [ "$MATRIX_INDEX" -gt 1 ]; then
            DELAY_SECONDS=$(((MATRIX_INDEX - 1) * 300))
            echo "Matrix index: $MATRIX_INDEX — delaying $DELAY_SECONDS seconds to prevent cache API rate limits"
            sleep "$DELAY_SECONDS"
          fi

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-build-${{ matrix.target }}
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build or restore WASM bindings from cache
        id: wasm
        uses: kreuzberg-dev/actions/build-and-cache-binding@v1
        with:
          binding-name: wasm
          platform: ${{ matrix.os }}
          build-command: task wasm:build:ci
          cache-paths: |
            crates/kreuzberg-wasm/pkg/
          cache-version: v1
          rust-hash: "n/a"
          binding-files: |
            crates/kreuzberg-wasm/**
          dep-files: |
            Cargo.lock
            crates/kreuzberg-wasm/Cargo.toml

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.target }}
          path: |
            crates/kreuzberg-wasm/pkg/*.wasm
            crates/kreuzberg-wasm/pkg/*.js
            crates/kreuzberg-wasm/pkg/*.ts
            crates/kreuzberg-wasm/pkg/package.json
          retention-days: 7

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1


  type-definitions:
    name: Type Definitions Check
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-types
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build WASM (required for type generation)
        shell: bash
        run: task wasm:build:bundler

      - name: Type-check WASM
        shell: bash
        run: task wasm:typecheck
        env:
          NODE_ENV: production

      - name: Verify .d.ts files exist
        shell: bash
        run: scripts/ci/wasm/verify-dts-files.sh

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1


  integration-tests-node:
    name: Integration Tests (Node ${{ matrix.node-version }})
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    needs: [build-wasm-targets]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-x86_64-unknown-linux-gnu
          path: crates/kreuzberg-wasm/pkg/

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-test-ubuntu
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run WASM tests
        shell: bash
        # Use pre-built WASM artifacts (downloaded above) — skip wasm-pack rebuild
        # which would require WASI SDK for Tesseract/Leptonica compilation.
        run: |
          cd crates/kreuzberg-wasm
          pnpm run fix:wasi
          pnpm run build:ts
          pnpm run copy:pkg
          pnpm test


  deno-tests:
    name: Deno Tests
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-deno-ubuntu
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Setup Node (for wasm-pack and build tools)
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        shell: bash
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Download tessdata
        shell: bash
        run: |
          mkdir -p tessdata
          wget -q https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata -O tessdata/eng.traineddata

      - name: Build WASM (all targets for E2E)
        shell: bash
        run: task wasm:build:all

      - name: Generate Deno E2E tests
        shell: bash
        run: task wasm:e2e:deno:generate

      - name: Run Deno E2E tests
        shell: bash
        run: task wasm:e2e:deno:test
        env:
          TESSDATA_PREFIX: ${{ github.workspace }}/tessdata

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1


  workers-tests:
    name: Cloudflare Workers Tests
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: wasm-workers
          use-sccache: 'true'
          report-stats: 'true'
          target: wasm32-unknown-unknown

      - name: Setup Node
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Install wasm-pack
        run: scripts/ci/wasm/install-wasm-pack.sh

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build WASM (all targets for E2E)
        run: task wasm:build:all

      - name: Generate Workers E2E tests
        run: task wasm:e2e:workers:generate

      - name: Run Cloudflare Workers E2E tests
        run: task wasm:e2e:workers:test

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1
