# ---------------------------------------------------------------------------
# Version synchronization
# ---------------------------------------------------------------------------

[sync]
extra_paths = [
    "packages/python/kreuzberg/__init__.py",
    "packages/ruby/lib/kreuzberg/version.rb",
    "crates/kreuzberg-node/package.json",
    "crates/kreuzberg-node/npm/*/package.json",
    "packages/go/go.mod",
]

# ---------------------------------------------------------------------------
# Adapters — all currently excluded (reference excluded types)
# ---------------------------------------------------------------------------
# Adapters will be re-added as types are brought back into include list.

# ---------------------------------------------------------------------------
# Test commands
# ---------------------------------------------------------------------------

[test.python]
precondition = "command -v uv >/dev/null 2>&1"
before = "cd packages/python && maturin develop --release"
command = "cd packages/python && uv run pytest tests/ -v"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[test.node]
precondition = "command -v npx >/dev/null 2>&1"
before = "cd crates/kreuzberg-node && napi build --output-dir . --release"
command = "npx vitest run --config packages/typescript/vitest.config.ts"
e2e = "cd e2e/typescript && npx vitest run"

[test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-ffi"
e2e = "cd e2e/go && go test ./... -count=1"

[test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd e2e/ruby && bundle install"
command = "cd e2e/ruby && bundle exec rspec"
e2e = "cd e2e/ruby && bundle exec rspec"

[test.php]
precondition = "command -v composer >/dev/null 2>&1"
before = "cd e2e/php && composer install"
command = "cd e2e/php && composer test"
e2e = "cd e2e/php && composer test"

[test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-ffi"
command = "cd e2e/java && mvn test -q"
e2e = "cd e2e/java && mvn test -q"

[test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-ffi"
command = "dotnet test e2e/csharp"
e2e = "dotnet test e2e/csharp"

[test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get && mix compile"
command = "cd e2e/elixir && mix test"
e2e = "cd e2e/elixir && mix test"

[test.r]
precondition = "command -v Rscript >/dev/null 2>&1"
command = "cd e2e/r && Rscript -e \"devtools::load_all('../../packages/r'); testthat::set_max_fails(Inf); testthat::test_dir('tests')\""
e2e = "cd e2e/r && Rscript -e \"devtools::load_all('../../packages/r'); testthat::set_max_fails(Inf); testthat::test_dir('tests')\""

[test.wasm]
precondition = "command -v wasm-pack >/dev/null 2>&1"
before = "wasm-pack build crates/kreuzberg-wasm --release --target bundler && cd e2e/wasm && npm install"
e2e = "cd e2e/wasm && npm test"

[test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test"

[test.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-ffi"
command = "cd packages/kotlin && gradle test --no-daemon"
e2e = "cd e2e/kotlin && gradle test --no-daemon"

[test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-swift"
command = "cd packages/swift && swift test"
e2e = "cd e2e/swift && swift test"

[test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-dart"
command = "cd packages/dart && dart pub get && dart test"
e2e = "cd e2e/dart && dart pub get && dart test"

[test.gleam]
precondition = "command -v gleam >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get && mix compile"
command = "cd packages/gleam && gleam test"
e2e = "cd e2e/gleam && gleam test"

[test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build --release -p kreuzberg-ffi"
command = "cd packages/zig && zig build test"
e2e = "cd e2e/zig && zig build test"

# ---------------------------------------------------------------------------
# Lint commands
# ---------------------------------------------------------------------------

[lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "cd packages/python && uv sync"
typecheck = "cd packages/python && uv run mypy ."

[lint.node]
precondition = "command -v npx >/dev/null 2>&1"
format = "npx oxfmt packages/typescript"
check = "npx oxlint packages/typescript"

[lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[lint.php]
precondition = "command -v composer >/dev/null 2>&1"
before = "cd packages/php && composer install"
format = "cd packages/php && vendor/bin/php-cs-fixer fix ."
check = "cd packages/php && vendor/bin/phpstan --configuration=phpstan.neon --memory-limit=512M"

[lint.go]
before = "cargo build --release -p kreuzberg-ffi"

[lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[lint.wasm]
precondition = "test -d crates/kreuzberg-wasm/typescript"
format = "npx oxfmt crates/kreuzberg-wasm/typescript"
check = "npx oxlint crates/kreuzberg-wasm/typescript"

[lint.ffi]
precondition = "test -d e2e/c"
format = "find e2e/c -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "find crates/kreuzberg-ffi/include -name '*.h' | xargs clang-format --dry-run --Werror"

[lint.kotlin]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin && gradle ktlintCheck --no-daemon"

[lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[lint.gleam]
precondition = "command -v gleam >/dev/null 2>&1"
format = "cd packages/gleam && gleam format"
check = "cd packages/gleam && gleam format --check"

[lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

# ---------------------------------------------------------------------------
# E2E test generation
# ---------------------------------------------------------------------------

[e2e]
fixtures = "fixtures"
output = "e2e"
languages = ["python", "rust", "node", "go", "ruby", "elixir", "wasm", "java", "csharp", "php", "r"]
fields_optional = ["content", "metadata.format"]

[e2e.call]
function = "extract_file"
module = "kreuzberg"
result_var = "result"
async = true
args = [
    { name = "path", field = "input.path", type = "string" },
    { name = "mime_type", field = "input.mime_type", type = "string", optional = true },
    { name = "config", field = "input.config", type = "json_object", optional = true },
]

[e2e.call.overrides.rust]
crate_name = "kreuzberg"
function = "extract_file"

[e2e.call.overrides.python]
module = "kreuzberg"
function = "extract_file"
options_type = "ExtractionConfig"

[e2e.call.overrides.node]
module = "kreuzberg"
function = "extractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.go]
module = "github.com/kreuzberg-dev/kreuzberg/v4"
function = "ExtractFile"
alias = "kreuzberg"
options_type = "ExtractionConfig"

[e2e.call.overrides.java]
class = "dev.kreuzberg.Kreuzberg"
function = "extractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.csharp]
class = "Kreuzberg"
function = "ExtractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.ruby]
options_type = "Kreuzberg::ExtractionConfig"

[e2e.call.overrides.elixir]
options_type = "ExtractionConfig"
handle_struct_type = "ExtractionConfig"

[e2e.call.overrides.wasm]
options_type = "JsExtractionConfig"

[e2e.call.overrides.php]
class = "Kreuzberg\\Kreuzberg"
function = "extractFile"
options_type = "ExtractionConfig"

[e2e.call.overrides.r]
function = "extract_file"
options_type = "ExtractionConfig"

