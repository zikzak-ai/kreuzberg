  "PaddleOcrConfig",
  "PaddleLanguage",
  "LayoutClass",
  "LayoutDetectionConfig",
  "LayoutDetection",
  "DetectionResult",
  "PSMMode",
  "BBox",
  "TableModel",
  "EmbeddingConfig",
  "EmbeddingResult",
  "DocOrientationResult",
  "OrientationResult",
  "OcrFallbackDecision",
  "ModelPaths",
  "OcrProcessor",
  "TesseractConfig",
  "OcrCacheStats",
  "TessdataManager",
  "PageLayoutResult",
  "PageTiming",
  "ProcessingWarning",
  "RecognizedTable",
  # Feature-gated types (not available in WASM feature set)
  "ChunkSizing",
  # MCP parameter types not compatible with wasm-bindgen (Option<JsValue> fields)
  "BatchExtractFilesParams",
]
exclude_functions = [
  # paddle-ocr / layout-detection / embeddings / auto-rotate
  "embed_texts",
  "embed_text",
  "detect_layout",
  "detect_orientation",
  "run_ocr_pipeline",
  "process_ocr_element",
  "layout_runner",
  "record_success_on_current_span",
  "record_error_on_current_span",
  # ocr module (requires full ocr, not ocr-wasm)
  "compute_hash",
  "assemble_ocr_markdown",
  "validate_tesseract_version",
  # paddle_ocr module
  "is_language_supported",
  "language_to_script_family",
  "map_language_code",
  # embeddings module
  "normalize",
  "list_presets",
  # image module (ort-dependent preprocessing)
  "calculate_optimal_dpi",
  "calculate_smart_dpi",
  # ort_discovery
  "ensure_ort_available",
  # pdf layout_runner
  "run_layout_for_page",
  "run_layout_for_pdf",
  # telemetry internals
  "sanitize_path",
  # layout detection
  "config_from_extraction",
  "detect_layout_for_images",
  # Uses excluded types WasmDetectionResult/WasmRecognizedTable
  "recognize_page_tables",
  # Functions using excluded types/modules
  "generate_embeddings_for_chunks",
  "apply_heuristics",
  "greedy_nms",
  # docx extraction functions (internal, not public API)
  "detect_page_breaks_from_docx",
