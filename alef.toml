  # Dependency-owned types that cannot be converted for cross-language bindings
  "LayoutEngine", # tch-rs Session wrapper — can't serialize
  "NormalizeResult", # ort output type — internal, can't serialize

  # Internal stats/response types
  "NativeTextStats", # missing Debug
  "ErrorResponse", # API-only error response
  "ApiSizeLimits", # internal API config
  "PdfExtractionMetadata", # internal PDF metadata

  "VlmOcrBackend",
  "ApiError",
]
functions = [
  # Internal functions not part of public API (kept for compatibility)
  "resolve_cache_dir",
  "detect_and_rotate",
  "ensure_initialized",
  "register_keyword_processor",
  "register_chunking_processor",
  # Plugin-registry accessors — internal mechanism, not user-facing. Used by
  # integration tests inside the kreuzberg crate; must stay `pub` for those.
  "get_document_extractor_registry",
  "get_embedding_backend_registry",
  "get_ocr_backend_registry",
  "get_post_processor_registry",
  "get_renderer_registry",
  "get_validator_registry",
  # Format catalog — internal to CLI/server. Cli accesses via the submodule path.
  "list_supported_formats",
  # chunk_text — invoked via ExtractionConfig.chunking; only kreuzberg-cli still
  # calls the standalone function directly. Not part of the public binding API.
  "chunk_text",
  # Renderers — invoked via ExtractionConfig.output_format; standalone fns are
  # internal. render_json is referenced by an integration test in the kreuzberg crate.
  "render_json",
  # validate_mime_type — used by integration tests inside the kreuzberg crate;
  # the public path is via ExtractionConfig validation, not standalone.
  "validate_mime_type",
  # Config serde plumbing — internal, exposed only for CLI/server.
  "build_config_from_json",
  "merge_config_json",
  # Text quality / utility helpers — public path is via ExtractionConfig.
  "clean_extracted_text",
  "normalize_whitespace",
  # Internal pool helpers / cache helpers / OCR helpers / image classifiers.
  "clear_processor_cache",
  "cluster_tiles",
  "compute_hash",
  "create_byte_buffer_pool",
  "create_string_buffer_pool",
  # Internal converters — invoked via ExtractionConfig.output_format.
  "djot_content_to_djot",
  "excel_to_markdown",
  "excel_to_text",
  "extraction_result_to_djot",
  # Server / MCP / API entry points — these belong to kreuzberg-cli + the api
  # / mcp features, not the language bindings.
  "openapi_json",
  "serve_default",
  "serve_with_server_config",
  "start_mcp_server",
  "start_mcp_server_with_config",
  # Internal transform — used by the rendering pipeline.
  "transform_extraction_result_to_elements",
  # Validation — same rationale as validate_mime_type.
  "validate_language_code",
  # Cache plumbing — internal mechanism. Not part of the public binding API.
  "get_cache_metadata",
  "clear_cache_directory",
  # Pipeline internals — invoked by extract_file/extract_bytes. Not part of public API.
  "apply_output_format",
  "run_pipeline",
  "run_pipeline_sync",
  "derive_extraction_result",
  "classify",
  "convert_html_to_markdown",
  # Server / MCP — under `kreuzberg-cli` and the api/mcp features. Not public bindings.
  "create_router",
  "create_router_with_limits",
  "serve",
  "serve_with_config",
  "serve_with_config_and_limits",
  "start_mcp_server_http",
  "start_mcp_server_http_with_config",
  # Trait-bridge `register_*`/`unregister_*` functions — `gen_trait_bridge`
  # already emits the idiomatic bridge form per language. `gen_function` would
  # also emit them with the raw opaque-type signature, producing duplicate
  # definitions and a compile error in the binding crate. Excluding here keeps
  # only the bridge-generated variant.
  "register_ocr_backend",
  "register_post_processor",
  "register_validator",
  "register_embedding_backend",
  "unregister_ocr_backend",
  "unregister_post_processor",
  "unregister_validator",
  "unregister_embedding_backend",
  # warm_model — used by kreuzberg-cli `kreuzberg cache warm` and by the api/mcp
  # `cache.warm` endpoints. Not part of the public binding surface.
  "warm_model",
  # list_embedding_backends — used by kreuzberg-cli for backend discovery; not
  # part of the public binding surface (see also the trait_bridge variants).
  "list_embedding_backends",
]
methods = [
  "OcrElement.with_rotation_opt",
  "VlmOcrBackend.backend_type",
  "ApiError.validation",
  "ApiError.unprocessable",
  "ApiError.internal",
  "ApiError.bad_gateway",
  "ApiError.from",

