# ---------------------------------------------------------------------------

[dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
r = "list"

# ---------------------------------------------------------------------------
# Scaffold metadata
# ---------------------------------------------------------------------------

[scaffold]
description = "High-performance document intelligence library"
license = "Elastic-2.0"
repository = "https://github.com/kreuzberg-dev/kreuzberg"
homepage = "https://kreuzberg.dev"
authors = ["Na'aman Hirschfeld <naaman@kreuzberg.dev>"]
keywords = ["document", "extraction", "pdf", "ocr", "text"]

# ---------------------------------------------------------------------------
# Trait bridges — generate FFI bridge code for plugin traits
# ---------------------------------------------------------------------------

# [[trait_bridges]]
# trait_name = "OcrBackend"
# super_trait = "kreuzberg::plugins::Plugin"
# registry_getter = "kreuzberg::plugins::registry::get_ocr_backend_registry"
# register_fn = "register_ocr_backend"
# NOTE: disabled — bridge codegen emits broken code:
#   KreuzbergError::Plugin treated as tuple variant (it's struct),
#   Vec<u8>: From<&Path> not satisfied, mismatched types in vtable calls,
#   OcrBackendRegistry::unregister method not found.
#   Re-enable once alef bridge codegen is fixed upstream.

[[trait_bridges]]
trait_name = "EmbeddingBackend"
super_trait = "kreuzberg::plugins::Plugin"
registry_getter = "kreuzberg::plugins::registry::get_embedding_backend_registry"
register_fn = "register_embedding_backend"
# Elixir bridge produces code that holds rustler::OwnedEnv / SavedTerm — those
# embed `*mut ErlNifEnv` raw pointers that are not Sync, so the generated
# `RustlerEmbeddingBackendBridge` cannot satisfy `Plugin: Send + Sync + 'static`.
# Mirrors the existing exclusions for OcrBackend / PostProcessor / Validator.
exclude_languages = ["elixir"]

# TODO: add PostProcessor and Validator bridges once OcrBackend is proven
# [[trait_bridges]]
# trait_name = "PostProcessor"
# super_trait = "kreuzberg::plugins::Plugin"
# registry_getter = "kreuzberg::plugins::registry::get_post_processor_registry"
# register_fn = "register_post_processor"
#
# [[trait_bridges]]
# trait_name = "Validator"
# super_trait = "kreuzberg::plugins::Plugin"
# registry_getter = "kreuzberg::plugins::registry::get_validator_registry"
# register_fn = "register_validator"

