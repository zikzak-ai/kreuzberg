# ---------------------------------------------------------------------------
# Output directories
# ---------------------------------------------------------------------------

[output]
python = "crates/kreuzberg-py/src/"
node = "crates/kreuzberg-node/src/"
ruby = "packages/ruby/ext/kreuzberg_rb/src/"
php = "crates/kreuzberg-php/src/"
ffi = "crates/kreuzberg-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/kreuzberg_nif/src/"
wasm = "crates/kreuzberg-wasm/src/"
java = "packages/java/src/main/java/"
csharp = "packages/csharp/src/"
r = "packages/r/src/rust/src/"
kotlin = "packages/kotlin/src/main/kotlin/dev/kreuzberg/"
swift = "packages/swift/Sources/Kreuzberg/"
dart = "packages/dart/lib/src/"
gleam = "packages/gleam/src/"
zig = "packages/zig/src/"

# ---------------------------------------------------------------------------
# Language-specific configuration
# ---------------------------------------------------------------------------

[python]
module_name = "_kreuzberg"
exclude_functions = [
    # Python-specific codegen issues (type conversion, cfg-gating)
    "run_pipeline_sync",
    "start_mcp_server_http_with_config",
    "acquire_string_buffer",
    "batch_cleanup_caches",
    "validate_vlm_backend_config",
    "extract_text_from_image_with_ocr",
    "extract_text_from_iwa_files",
    "apply_execution_providers",
    "cluster_font_sizes",
    "reextract_raw_images_via_pdfium",
    "detect_layout_for_images",
    "extract_metadata_with_passwords",
    "extract_text_from_pdf_with_passwords",
    "process_images_with_ocr",
    # Vec<&str> generated but Rust API expects &[String] — type mismatch
    "batch_reduce_tokens",
    "chunk_texts_batch",
]
exclude_types = [
    # Arc<Mutex<T>> opaque types — codegen doesn't generate .lock() for methods
    "PooledString",
]

