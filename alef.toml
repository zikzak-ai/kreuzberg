# Package references for e2e tests

[e2e.packages.rust]
path = "../../crates/kreuzberg"

[e2e.packages.python]
name = "kreuzberg"
path = "../../packages/python"

[e2e.packages.node]
name = "kreuzberg"
path = "../../crates/kreuzberg-node"

[e2e.packages.go]
module = "github.com/kreuzberg-dev/kreuzberg/v4"
path = "../../packages/go"
[e2e.packages.csharp]
name = "Kreuzberg"
path = "../../packages/csharp/Kreuzberg.csproj"

[e2e.packages.java]
module = "dev.kreuzberg"
path = "../../packages/java"

[e2e.packages.ruby]
name = "kreuzberg"
path = "../../packages/ruby"

[e2e.packages.elixir]
module = "Kreuzberg"
path = "../../packages/elixir"

[e2e.packages.php]
name = "Kreuzberg"
path = "../../packages/php"

[e2e.packages.r]
module = "kreuzberg"
path = "../../packages/r"

[e2e.format]
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
rust = "(cd {dir} && cargo fmt --all)"

[e2e.fields]
"metadata.title" = "metadata.format"

[e2e.fields_c_types]
"extraction_result.metadata" = "Metadata"

[publish]
core_crate = "crates/kreuzberg"

[publish.languages.ruby]
vendor_mode = "core-only"

[publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[publish.languages.r]
vendor_mode = "full"

[publish.languages.ffi]
pkg_config = true
cmake_config = true
