[package]
name = "kreuzberg-ffi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "C FFI bindings for Kreuzberg document intelligence library"
license.workspace = true
repository = "https://github.com/kreuzberg-dev/kreuzberg"
homepage = "https://kreuzberg.dev"
documentation = "https://docs.rs/kreuzberg-ffi"
readme = "README.md"
keywords = ["ffi", "bindings", "document", "extraction", "api"]
categories = ["development-tools::ffi", "text-processing"]

[package.metadata.cargo-machete]
ignored = ["cbindgen"]

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
default = []
rayon = ["dep:rayon"]

[dependencies]
ahash = { workspace = true }
async-trait = { workspace = true }
ctor = { workspace = true }
html-to-markdown-rs = { workspace = true }
log = { workspace = true }
rayon = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

[target.'cfg(all(windows, target_env = "gnu"))'.dependencies]
kreuzberg = { workspace = true, features = [
    "pdf",
    "excel",
    "office",
    "email",
    "html",
    "xml",
    "archives",
    "ocr",
    "language-detection",
    "chunking",
    "chunking-tokenizers",
    "embeddings",
    "quality",
    "keywords",
    "api",
    "mcp",
    "otel",
    "tree-sitter",
    "bundled-pdfium",
] }

[target.'cfg(not(all(windows, target_env = "gnu")))'.dependencies]
kreuzberg = { workspace = true, features = ["bundled-pdfium", "full"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }
serial_test = "3.4.0"
tempfile = { workspace = true }

[[bench]]
name = "result_view_benchmark"
harness = false
