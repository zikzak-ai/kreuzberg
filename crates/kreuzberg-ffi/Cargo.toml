[package]
name = "kreuzberg-ffi"
version = "5.0.0-rc.1"
edition = "2021"
license = "Elastic-2.0"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "pdf", "ocr", "text"]
categories = ["text-processing"]
repository = "https://github.com/kreuzberg-dev/kreuzberg"

[package.metadata.cargo-machete]
# tokio is pulled in for its runtime/macros at link time but the generated
# FFI source never `use`s it directly — cargo-machete would otherwise flag it.
ignored = ["tokio"]

[lib]
crate-type = ["cdylib", "staticlib"]

[features]
default = []

[dependencies]
async-trait = "0.1"
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# x86_64-linux-android (emulator) lacks an ORT prebuilt and there is no path to
# get one short of compiling ORT from source for that triple, so we ship the
# no-ORT android-target feature group instead.
[target.'cfg(all(target_os = "android", target_arch = "x86_64"))'.dependencies]
kreuzberg = { path = "../kreuzberg", default-features = false, features = ["android-target"] }

# Non-android (incl. arm64 Android phones via pyke prebuilts) — full feature set with ORT.
# pyke's ort ships aarch64-linux-android prebuilts, so real Android devices keep ORT.
[target.'cfg(not(all(target_os = "android", target_arch = "x86_64")))'.dependencies]
kreuzberg = { path = "../kreuzberg", features = ["full", "pdf", "ocr", "paddle-ocr", "layout-detection", "embeddings", "chunking", "keywords-yake", "keywords-rake", "language-detection", "html", "tree-sitter", "office", "email", "archives", "stopwords", "auto-rotate", "tokio-runtime", "api", "mcp", "liter-llm", "quality"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
tempfile = "3"
