[package]
name = "kreuzberg-php"
version = "4.10.0-rc.2"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
ext-php-rs = "0.15"
kreuzberg = { path = "../kreuzberg", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
