[package]
name = "kreuzberg-node"
version = "4.10.0-rc.2"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
kreuzberg = { path = "../kreuzberg", features = ["full"] }
napi = { version = "3", features = ["async"] }
napi-derive = "3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
napi-build = "2"
