version: "3"

# ============================================================================
# kreuzberg — Root Taskfile
# ============================================================================
# Primary development interface. Rust core tasks delegate to .task/languages/rust.yml.
# All binding language operations (setup, build, test, lint, format, clean,
# update, upgrade, publish) are handled by alef v0.7.9.
#
# Command patterns:
#   task setup         -> install all dependencies
#   task build         -> build core + bindings (debug)
#   task build:release -> build core + bindings (release)
#   task test          -> run all tests
#   task test:e2e      -> generate + run e2e tests for all bindings
#   task test:cov      -> tests with coverage
#   task format        -> format all code (cargo fmt + alef fmt)
#   task lint          -> lint via prek (full pre-commit chain)
#   task update        -> compatible dependency updates everywhere
#   task upgrade       -> aggressive upgrades (cargo upgrade --incompatible,
#                         pnpm up --latest, uv sync --upgrade, bundle update, etc.)
#   task clean         -> remove all build artifacts
#   task publish:*     -> alef publish validate/prepare/build/package
#   task rust:*        -> Rust-specific tasks
# ============================================================================

includes:
  rust:
    taskfile: ./.task/languages/rust.yml
  version:
    taskfile: ./.task/tools/version-sync.yml
  benchmark:
    taskfile: ./.task/workflows/benchmark.yml
  pdfium:
    taskfile: ./.task/tools/pdfium.yml
  docs:
    taskfile: ./.task/tools/docs.yml
  demo:
    taskfile: ./.task/tools/demo.yml
  _tools:
    taskfile: ./.task/tools/general.yml
    flatten: true

tasks:
  # === Default ===
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # === Setup ===
  setup:
    desc: "Install all dependencies and setup development environment"
    cmds:
      - task: rust:install
      - alef setup
      - task: pre-commit:install

  # === Build ===
  build:
    desc: "Build core Rust library and all language bindings (debug)"
    cmds:
      - task: rust:build:dev
      - alef build

  build:release:
    desc: "Build core Rust library and all language bindings (release)"
    cmds:
      - task: rust:build:release
      - alef build --release

  build:ci:
    desc: "Build all in CI mode"
    cmds:
      - task: rust:build:ci

  build:core:
    desc: "Build Rust core library only"
    cmds:
      - task: rust:build

  build:bindings:
    desc: "Build all language bindings (skip Rust core)"
    cmds:
      - alef build

  build:cli:
    desc: "Build the kreuzberg CLI binary"
    cmds:
      - task: rust:cli:build

  # === Test ===
  test:
    desc: "Run all test suites (Rust core + bindings)"
    cmds:
      - task: rust:test
      - alef test

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:e2e:
    desc: "Generate and run e2e tests across all bindings"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef e2e generate
      - alef test --e2e

  test:cov:
    desc: "Run all tests with coverage"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  test:ci:
    desc: "Run all tests with coverage (CI mode, alias for test:cov)"
    cmds:
      - task: test:cov

  # === Lint & Format ===
  lint:
    desc: "Lint all code via prek (pre-commit framework)"
    cmds:
      - prek run --all-files

  lint:check:
    desc: "Lint all code WITHOUT auto-fix (check-only, Rust + bindings)"
    cmds:
      - task: rust:lint:check
      - alef lint

  format:
    desc: "Format all code (Rust + all bindings)"
    cmds:
      - cargo fmt --all
      - alef fmt

  fmt:
    desc: "Format all code (alias for format)"
    cmds:
      - task: format

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  check:
    desc: "Run all checks (format + lint, no modifications)"
    cmds:
      - task: format:check
      - task: lint:check

  # === Update / Upgrade ===
  update:
    desc: "Update dependencies (compatible only)"
    cmds:
      - task: rust:update
      - alef update
      - prek autoupdate

  upgrade:
    desc: "Upgrade dependencies aggressively (cargo upgrade --incompatible, pnpm up --latest, uv sync --upgrade, etc.)"
    cmds:
      - rustup update stable
      - task: rust:upgrade
      - alef update --latest
      - prek autoupdate

  # === Coverage ===
  cov:rust:
    desc: "Generate Rust coverage report"
    cmds:
      - task: rust:test:ci

  cov:all:
    desc: "Generate coverage for all languages"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  # === Version ===
  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - task: version:sync

  # === Alef lifecycle ===
  alef:generate:
    desc: "Run full alef pipeline (generate + stubs + scaffold + readme + docs + e2e)"
    cmds:
      - alef all --clean

  alef:verify:
    desc: "Check bindings are up-to-date (CI mode)"
    cmds:
      - alef verify --exit-code

  alef:build:
    desc: "Build all language bindings"
    cmds:
      - alef build

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - alef sync-versions

  alef:docs:
    desc: "Generate API reference documentation"
    cmds:
      - alef docs --output docs/reference/

  # === E2E tests ===
  e2e:generate:
    desc: "Generate E2E tests for all languages from fixtures"
    cmds:
      - alef e2e generate

  e2e:build:
    desc: "Build all language bindings used by e2e suites (release)"
    cmds:
      - alef build --release --lang python,node,ruby,php,ffi,go,java,csharp,elixir,wasm,r

  e2e:run:
    desc: "Run all e2e test suites across all languages"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang rust,python,node,ruby,php,go,java,csharp,elixir,wasm,r

  e2e:all:
    desc: "Build all bindings + run all e2e tests (single command)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef build --release --lang python,node,ruby,php,ffi,go,java,csharp,elixir,wasm,r
      - alef test --e2e --lang rust,python,node,ruby,php,go,java,csharp,elixir,wasm,r

  e2e:test:
    desc: "Run E2E tests for all languages (alias for e2e:run)"
    cmds:
      - task: e2e:run

  rust:e2e:
    desc: "Run Rust e2e tests via alef"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang rust

  python:e2e:
    desc: "Run Python e2e tests (builds kreuzberg-py via maturin first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang python

  go:e2e:
    desc: "Run Go e2e tests (builds kreuzberg-ffi first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang go

  node:e2e:
    desc: "Run Node/TypeScript e2e tests (builds NAPI module first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang node

  ruby:e2e:
    desc: "Run Ruby e2e tests"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang ruby

  php:e2e:
    desc: "Run PHP e2e tests"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang php

  wasm:e2e:
    desc: "Run WASM e2e tests (builds wasm-pack bundle first)"
    cmds:
      - alef test --e2e --lang wasm

  elixir:e2e:
    desc: "Run Elixir e2e tests (compiles NIF first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang elixir

  java:e2e:
    desc: "Run Java e2e tests (builds kreuzberg-ffi first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang java

  csharp:e2e:
    desc: "Run C# e2e tests (builds kreuzberg-ffi first)"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang csharp

  r:e2e:
    desc: "Run R e2e tests"
    deps: [pdfium:ensure]
    env:
      KREUZBERG_PDFIUM_PATH: "{{.ROOT_DIR}}/target/release"
      DYLD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
      LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
    cmds:
      - alef test --e2e --lang r

  # === Publish ===
  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  # === Language binding lint/format ===
  go:lint:
    desc: "Lint Go binding with golangci-lint"
    cmds:
      - golangci-lint run ./...
    dir: packages/go/v4

  ruby:format:
    desc: "Format Ruby binding with rubocop"
    cmds:
      - bundle exec rubocop --autocorrect
    dir: packages/ruby

  ruby:lint:
    desc: "Lint Ruby binding with rubocop and steep"
    cmds:
      - bundle exec rubocop
      - bundle exec steep check
    dir: packages/ruby

  php:build:
    desc: "Build the kreuzberg-php native extension (cdylib)"
    cmds:
      - cargo build --release -p kreuzberg-php

  php:format:
    desc: "Format PHP binding with php-cs-fixer"
    cmds:
      - php-cs-fixer fix
    dir: packages/php

  php:lint:
    desc: "Lint PHP binding with phpstan and php-cs-fixer"
    cmds:
      - php-cs-fixer fix --dry-run --diff
      - phpstan analyse --memory-limit=2G
    dir: packages/php

  python:build:sdist:publish:
    desc: "Build the Python sdist using maturin"
    dir: packages/python
    env:
      DIST_DIR: '{{.DIST_DIR | default "../../dist"}}'
    cmds:
      - mkdir -p "$DIST_DIR"
      - maturin sdist --out "$DIST_DIR"

  wasm:build:all:
    desc: "Alias for rust:wasm:build:all (build all WASM targets + TS wrapper)"
    deps: [rust:wasm:build:all]

  java:build:release:
    desc: "Build the Java binding via Maven (mvn package)"
    dir: packages/java
    cmds:
      - mvn -B -DskipTests package

  csharp:build:release:
    desc: "Build the C# binding in Release configuration"
    dir: packages/csharp
    cmds:
      - dotnet build --configuration Release

  csharp:package:
    desc: "Pack the C# binding into a NuGet package (forwards extra args)"
    dir: packages/csharp
    cmds:
      - dotnet pack --configuration Release {{.CLI_ARGS}}

  csharp:format:
    desc: "Format C# binding with dotnet format"
    cmds:
      - dotnet format
    dir: packages/csharp

  csharp:lint:
    desc: "Lint C# binding with dotnet format --verify-no-changes"
    cmds:
      - dotnet format --verify-no-changes
    dir: packages/csharp

  kotlin:format:
    desc: "Format Kotlin binding with ktlint via gradle"
    cmds:
      - gradle ktlintFormat --no-daemon
    dir: packages/kotlin

  kotlin:lint:
    desc: "Lint Kotlin binding with ktlint via gradle"
    cmds:
      - gradle ktlintCheck --no-daemon
    dir: packages/kotlin

  kotlin:test:
    desc: "Run Kotlin binding tests"
    cmds:
      - cargo build --release -p kreuzberg-ffi
      - gradle test --no-daemon
    dir: packages/kotlin

  swift:format:
    desc: "Format Swift binding with swift format"
    cmds:
      - swift format --in-place --recursive Sources
    dir: packages/swift

  swift:lint:
    desc: "Lint Swift binding with swift format lint"
    cmds:
      - swift format lint --recursive Sources
    dir: packages/swift

  swift:test:
    desc: "Run Swift binding tests"
    cmds:
      - cargo build --release --manifest-path packages/swift/rust/Cargo.toml
      - swift test
    dir: packages/swift

  dart:format:
    desc: "Format Dart binding with dart format"
    cmds:
      - dart format .
    dir: packages/dart

  dart:lint:
    desc: "Lint Dart binding with dart analyze"
    cmds:
      - dart analyze
    dir: packages/dart

  dart:test:
    desc: "Run Dart binding tests"
    cmds:
      - cargo build --release --manifest-path packages/dart/rust/Cargo.toml
      - dart pub get
      - dart test
    dir: packages/dart

  gleam:format:
    desc: "Format Gleam binding with gleam format"
    cmds:
      - gleam format
    dir: packages/gleam

  gleam:lint:
    desc: "Lint Gleam binding with gleam format --check"
    cmds:
      - gleam format --check
    dir: packages/gleam

  gleam:test:
    desc: "Run Gleam binding tests"
    cmds:
      - cd ../elixir && mix deps.get && mix compile
      - cd ../gleam && gleam test
    dir: packages/gleam

  zig:format:
    desc: "Format Zig binding with zig fmt"
    cmds:
      - zig fmt src
    dir: packages/zig

  zig:lint:
    desc: "Check Zig formatting with zig fmt --check"
    cmds:
      - zig fmt --check src
    dir: packages/zig

  zig:test:
    desc: "Run Zig binding tests"
    cmds:
      - cargo build --release -p kreuzberg-ffi
      - zig build test
    dir: packages/zig

  # === Clean ===
  clean:
    desc: "Remove build artifacts across all languages"
    cmds:
      - cargo clean
      - alef clean
      - rm -rf coverage.lcov dist/ .alef/
