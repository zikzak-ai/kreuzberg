apiVersion: v1
kind: Service
metadata:
  name: {{ include "kreuzberg.fullname" . }}
  labels: {{- include "kreuzberg.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "kreuzberg.selectorLabels" . | nindent 4 }}
