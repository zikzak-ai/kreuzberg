default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|scripts/ci/|^e2e/|^packages/|^crates/kreuzberg-(py|node|ffi|php|wasm)/|^docs/reference/api-

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.14.2
    hooks:
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock|docs/benchmarks/app/|crates/kreuzberg-pdfium-render/
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
        exclude: ^charts/.*/templates/
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        exclude: "scripts/|benchmarks/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
        types: [rust]
      - id: cargo-clippy
        name: clippy (workspace)
        args: ["--fix", "--allow-dirty", "--allow-staged", "--workspace",
               "--all-features", "--all-targets", "--", "-D", "warnings"]
        files: ^(crates/|tools/|Cargo\.(toml|lock))
        types_or: [rust, toml]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON/CSS: biome (formatting + linting with autofixes)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.12
    hooks:
      - id: biome-format
        exclude: ^tools/benchmark-harness/fixtures/
      - id: biome-lint

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
        args: ["--fix"]
        exclude: ^tools/benchmark-harness/fixtures/

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ['-x']

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.80"
    hooks:
      - id: rumdl-fmt
        exclude: '^(tools/benchmark-harness/vendored/|docs/reference/(api-|configuration\.md|errors\.md|types\.md)|templates/readme/)'

  # Markdown prose linting: textlint
  - repo: local
    hooks:
      - id: textlint
        name: textlint (docs prose)
        entry: npx textlint
        language: node
        files: ^docs/.*\.md$
        exclude: ^docs/reference/(api-|configuration\.md|errors\.md|types\.md)
        pass_filenames: true

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos
        args: [--force-exclude]

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Alef: verify bindings are up to date
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.6.1
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # Helm
  - repo: local
    hooks:
      - id: helm-lint
        name: Helm lint (strict)
        entry: bash -c 'for chart in charts/*/; do helm lint --strict "$chart" || exit 1; done'
        language: system
        files: ^charts/
        pass_filenames: false

      - id: kubeconform
        name: kubeconform (Kubernetes schema validation)
        entry: bash -c 'for chart in charts/*/; do helm template test "$chart" | kubeconform -strict -kubernetes-version 1.28.0 -summary || exit 1; done'
        language: system
        files: ^charts/
        pass_filenames: false
