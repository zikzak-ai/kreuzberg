default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|scripts/ci/|^e2e/|^packages/|^crates/kreuzberg-(py|node|ffi|php|wasm)/|^docs/reference/api-|\.cache/|\.venv/|rust-vendor/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock|docs/benchmarks/app/|crates/kreuzberg-pdfium-render/
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
        exclude: ^charts/
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.4"
    hooks:
      - id: cargo-sort
        # `-w` (workspace) iterates ALL workspace members regardless of which Cargo.toml
        # was passed by pre-commit, ignoring this hook's `exclude:` filter and rewriting
        # alef-generated bindings (kreuzberg-{wasm,node,py,php,ffi}, packages/{dart,swift}/rust).
        # That breaks the downstream alef-verify hash check. Run per-file (no -w) so
        # `exclude:` actually filters correctly.
        exclude: ^(crates/kreuzberg-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust)/Cargo\.toml$

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=kreuzberg-ffi",
            "--exclude=kreuzberg-py",
            "--exclude=kreuzberg-node",
            "--exclude=kreuzberg-php",
            "--exclude=kreuzberg-wasm",
            "--exclude=kreuzberg-dart",
            "--exclude=kreuzberg_nif",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete
        exclude: ^e2e/

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.88"
    hooks:
      - id: rumdl-fmt
        exclude: '^(tools/benchmark-harness/vendored/|docs/reference/(api-|configuration\.md|errors\.md|types\.md)|templates/readme/|charts/)'

  # Python: ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Node/TS/WASM: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.61.1
    hooks:
      - id: oxlint
        args: ["--fix"]
        exclude: ^(tools/benchmark-harness/fixtures/|docs/snippets/)

  # cppcheck — not yet shipped in shared kreuzberg-dev/pre-commit-hooks repo
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
            "--suppress=unusedStructMember",
            "--suppress=normalCheckLevelMaxBranches",
          ]
        files: (^crates/kreuzberg-ffi/tests/c/|^tools/benchmark-harness/scripts/.*\.c$)

  # Java cpd — not yet shipped in shared kreuzberg-dev/pre-commit-hooks repo
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.37
    hooks:
      - id: cpd
        exclude: ^(\.mvn/wrapper/|e2e/|tools/e2e-generator/e2e/|crates/kreuzberg-wasm/e2e/)

  # Shared kreuzberg-dev polyglot hooks
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v0.1.0
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
        args: ["-x"]
      - id: clang-format
        args: ["--style=file"]
        files: ^crates/kreuzberg-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/kreuzberg-ffi/tests/c/
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^(\.mvn/wrapper/|e2e/|tools/e2e-generator/e2e/|crates/kreuzberg-wasm/e2e/|packages/java/src/)
      - id: java-verify
        files: ^packages/java/
      - id: mypy
        files: ^(lib|src|kreuzberg|tools)/.*\.py$
        exclude: "e2e/|tests/|scripts/"
      - id: go-fmt
        exclude: ^(e2e/|test_apps/|tools/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/|tools/)
      - id: govulncheck
        exclude: ^(e2e/|test_apps/|tools/)
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
      - id: phpstan
        files: ^packages/php/.*\.php$
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: air-format
        files: ^packages/r/.*\.[Rr]$
      - id: air-check
        files: ^packages/r/.*\.[Rr]$
      - id: lintr
        files: ^packages/r/.*\.[Rr]$
      - id: ktfmt
        args: ["--kotlinlang-style"]
        files: ^packages/kotlin/.*\.kts?$
      - id: detekt
        args: ["--build-upon-default-config"]
        files: ^packages/kotlin/.*\.kts?$
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: gleam-format
        files: ^packages/gleam/.*\.gleam$
      - id: gleam-check
        files: ^packages/gleam/.*\.gleam$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: helm-lint
        files: ^charts/.*/(Chart\.yaml|templates/.+\.ya?ml)$
      - id: kubeconform
        args: ["-strict", "-summary"]
        files: ^charts/.*/templates/.+\.ya?ml$
        exclude: ^charts/.*/(values|Chart)\.ya?ml$
      - id: textlint
        files: ^docs/[^/]+/[^/]+\.md$
        exclude: ^docs/(reference/|api-|snippets/|migration/)
        args:
          - "--fix"
          - "--rule"
          - "common-misspellings"
          - "--rule"
          - "doubled-spaces"
          - "--rule"
          - "no-empty-section"
          - "--rule"
          - "no-start-duplicated-conjunction"
          - "--rule"
          - "no-surrogate-pair"
          - "--rule"
          - "no-todo"
          - "--rule"
          - "no-zero-width-spaces"
          - "--rule"
          - "terminology"

  # Alef: verify bindings and sync versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.14.22
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker (last — runs after all formatters)
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        args: [--force-exclude]
