[package]
name = "kreuzberg_nif"
version = "5.0.0-rc.1"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "pdf", "ocr", "text"]
categories = ["text-processing"]

[lib]
name = "kreuzberg_nif"
crate-type = ["cdylib"]

[dependencies]
kreuzberg = { path = "../../../../crates/kreuzberg", features = [
  "full",
  "pdf",
  "ocr",
  "paddle-ocr",
  "layout-detection",
  "embeddings",
  "chunking",
  "keywords-yake",
  "keywords-rake",
  "language-detection",
  "html",
  "tree-sitter",
  "office",
  "email",
  "archives",
  "stopwords",
  "auto-rotate",
  "tokio-runtime",
  "api",
  "mcp",
  "liter-llm",
  "quality",
] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }

[lints.rust]
# Alef-emitted Rustler NIF code occasionally marks bindings `let mut` even where
# the body never reassigns. On most targets rustc only warns; with
# RUSTFLAGS=-D warnings on the Windows publish runner those warnings become hard
# errors and tank the build. Allow the lint since the contract is alef's.
unused_mut = "allow"
dead_code = "allow"

[workspace]
