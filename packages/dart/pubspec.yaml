name: kreuzberg
description: High-performance document intelligence library — extract text, metadata, tables from 97+ formats including PDF, DOCX, images, and email.
version: 5.0.0-rc.1
homepage: https://kreuzberg.dev
repository: https://github.com/arrrrny/kreuzberg/tree/main/packages/dart
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  # FRB runtime is pure-Dart; works in both Flutter and server-Dart contexts.
  flutter_rust_bridge: ^2.12.0
  # FRB codegen-2.x emits `@freezed` sealed classes annotated with these.
  freezed_annotation: '^2.4.0'
  json_annotation: '^4.9.0'
dev_dependencies:
  test: '^1.25.0'
  lints: '^5.0.0'
  # Required by flutter_rust_bridge_codegen 2.x for sealed classes.
  freezed: '^2.5.0'
  build_runner: '^2.4.0'
  json_serializable: '^6.8.0'
