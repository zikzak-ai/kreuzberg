[package]
name = "kreuzberg-dart"
version = "5.0.0-rc.1"
edition = "2024"
license = "Elastic-2.0"

[package.metadata.cargo-machete]
# Umbrella + sibling crates are pulled in so flutter_rust_bridge can resolve
# every referenced type, but the generated Rust wrapper only `use`s a subset.
ignored = ["kreuzberg"]

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "2.12.0"
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
async-trait = "0.1"

# Android lacks ORT prebuilts (ort-sys has no x86_64-linux-android binary),
# so on android we mirror `full` minus the ORT-requiring sub-features
# (paddle-ocr, layout-detection, embeddings, auto-rotate).
[target.'cfg(not(target_os = "android"))'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", features = ["full"] }

[target.'cfg(target_os = "android")'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", default-features = false, features = ["formats", "analysis", "services", "ocr", "chunking-tokenizers", "tree-sitter", "liter-llm", "tokio-runtime"] }

[lints.rust]
# flutter_rust_bridge uses #[cfg(frb_expand)] internally during macro expansion.
# Declare it as a known cfg so rustc does not emit unexpected_cfgs warnings.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
# alef-generated opaque struct mirrors keep `inner` fields for type alignment
# even when no method reads them; that's intentional, not dead code.
dead_code = "allow"
