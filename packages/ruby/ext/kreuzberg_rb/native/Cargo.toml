[package]
name = "kreuzberg-rb"
version = "4.10.0-rc.2"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "pdf", "ocr", "text"]
categories = ["text-processing"]

[lib]
name = "kreuzberg_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
kreuzberg = { path = "../../../../../crates/kreuzberg", features = ["full"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }

[lints]
workspace = true
