version: "3"
vars:
  RUST_LOG: info
  V3_TAG: v3.20.2
  BUNDLE: bundle
  GOLANGCI_LINT_VERSION: 2.6.2
silent: false
tasks:
  version:sync:
    desc: Sync version from Cargo.toml to all package manifests
    cmds:
      - uv run python scripts/sync_versions.py
  setup:
    desc: "Install all dependencies and initialize project. Idempotent - safe to re-run anytime."
    cmds:
      - task: rust:install
      - task: python:install
      - task: typescript:install
      - task: ruby:install
      - task: java:install
      - task: go:install
      - task: csharp:install
      - echo "Setup complete - safe to re-run anytime"
  build:
    desc: Build core libraries and language bindings
    cmds:
      - task: rust:build
      - task: python:build
      - task: ruby:build
      - task: typescript:build
      - task: java:build
      - task: csharp:build
  test:
    desc: Run test suites for all languages
    cmds:
      - task: rust:test
      - task: python:test
      - task: ruby:test
      - task: typescript:test
      - task: java:test
      - task: go:test
      - task: csharp:test
  lint:
    desc: Run all linters with auto-fix enabled
    cmds:
      - task: rust:lint
      - task: python:lint
      - task: typescript:lint
      - task: ruby:lint
      - task: java:lint
      - task: go:lint
      - task: csharp:lint
  lint:check:
    desc: Run all linters in check-only mode (no modifications)
    cmds:
      - task: rust:lint:check
      - task: python:lint:check
      - task: typescript:lint:check
      - task: ruby:lint:check
      - task: java:lint:check
      - task: go:lint:check
      - task: csharp:lint:check
  check:
    desc: Run all checks without modifications (lint + format checks)
    cmds:
      - task: lint:check
      - task: format:check
  format:
    desc: Format code for all languages (with modifications)
    cmds:
      - task: toml:format
      - task: rust:format
      - task: python:format
      - task: ruby:format
      - task: typescript:format
      - task: java:format
      - task: go:format
      - task: csharp:format
  format:check:
    desc: Check code formatting without modifications
    cmds:
      - task: toml:format:check
      - task: rust:format:check
      - task: python:format:check
      - task: ruby:format:check
      - task: typescript:format:check
      - task: java:format:check
      - task: go:format:check
      - task: csharp:format:check
  rust:install:
    desc: Install Rust toolchain and tools (rustup, cargo-install, taplo)
    cmds:
      - echo "Rust toolchain is typically installed via rustup"
      - rustc --version
      - echo "Installing taplo for TOML formatting (brew install taplo on macOS, or cargo install taplo-cli --locked)..."
      - which taplo || cargo install taplo-cli --locked
  rust:build:
    desc: Build all Rust crates
    cmds:
      - cargo build --release --workspace --all-features
  rust:test:
    desc: Run all Rust tests
    cmds:
      - cargo test --workspace --release --all-features
  rust:lint:
    desc: Lint Rust code with auto-fix (cargo fmt + clippy)
    cmds:
      - cargo fmt --all
      - cargo clippy --workspace --fix --allow-dirty --allow-staged
  rust:lint:check:
    desc: Lint Rust code in check-only mode (cargo fmt + clippy checks)
    cmds:
      - cargo fmt --all -- --check
      - cargo clippy --workspace -- -D warnings
  rust:format:
    desc: Format Rust code (cargo fmt with modifications)
    cmds:
      - cargo fmt --all
  rust:format:check:
    desc: Check Rust code formatting without modifications
    cmds:
      - cargo fmt --all -- --check
  toml:format:
    desc: Format TOML files with taplo
    cmds:
      - scripts/toml_format.sh
  toml:format:check:
    desc: Check TOML formatting without modifications
    cmds:
      - scripts/toml_format.sh --check
  rust:doc:
    desc: Generate Rust documentation
    cmds:
      - cargo doc --no-deps --open
  rust:update:
    desc: Update Rust dependencies
    cmds:
      - echo "Updating Rust dependencies..."
      - cargo upgrade --incompatible
      - cargo update
  python:install:
    desc: Install Python dependencies
    dir: packages/python
    cmds:
      - uv sync --all-extras --no-install-workspace
  python:setup:
    desc: Alias for python:install (idempotent)
    dir: packages/python
    cmds:
      - task: python:install
  python:test:
    desc: Run Python tests
    dir: packages/python
    cmds:
      - uv run pytest
  python:test:coverage:
    desc: Run Python tests with coverage
    dir: packages/python
    cmds:
      - uv run pytest --cov --cov-report=html
  python:lint:
    desc: Lint Python code with auto-fix (ruff check + format)
    dir: packages/python
    cmds:
      - uv run ruff check --fix
      - uv run ruff format
  python:lint:check:
    desc: Lint Python code in check-only mode (ruff + mypy)
    dir: packages/python
    cmds:
      - uv run ruff check
      - uv run ruff format --check
      - uv run mypy
  python:format:
    desc: Format Python code with modifications (ruff format)
    dir: packages/python
    cmds:
      - uv run ruff format
  python:format:check:
    desc: Check Python code formatting without modifications
    dir: packages/python
    cmds:
      - uv run ruff format --check
  python:build:
    desc: Build Python wheel
    dir: packages/python
    cmds:
      - maturin develop --release
  python:update:
    desc: Update Python dependencies
    cmds:
      - echo "Updating Python dependencies..."
      - uv run uv-bump
      - uv sync --all-packages --all-extras --upgrade --no-install-workspace
  ruby:install:
    desc: Install Ruby dependencies
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} install"
  ruby:setup:
    desc: Alias for ruby:install (idempotent)
    dir: packages/ruby
    cmds:
      - task: ruby:install
  ruby:build:
    desc: Build Ruby extension
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rake compile"
  ruby:update:
    desc: Update Ruby dependencies
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} update"
  ruby:test:
    desc: Run Ruby tests
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rspec"
  ruby:test:verbose:
    desc: Run Ruby tests with detailed output
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rspec --format documentation --color"
  ruby:lint:
    desc: Lint Ruby code with auto-fix (rubocop + steep)
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yml --autocorrect-all"
      - "{{.BUNDLE}} exec steep check"
  ruby:lint:check:
    desc: Lint Ruby code in check-only mode (rubocop + steep, no fixes)
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yml"
      - "{{.BUNDLE}} exec steep check"
  ruby:format:
    desc: Format Ruby code with modifications (rubocop)
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yml --autocorrect-all"
  ruby:format:check:
    desc: Check Ruby code formatting without modifications (rubocop)
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yml"
  ruby:typecheck:
    desc: Run steep type checking
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec steep check"
  ruby:console:
    desc: Open Ruby console with Kreuzberg loaded
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec pry -r ./lib/kreuzberg"
  typescript:install:
    desc: Install TypeScript dependencies
    dir: crates/kreuzberg-node
    cmds:
      - corepack enable
      - pnpm install -r
  typescript:setup:
    desc: Alias for typescript:install (idempotent)
    dir: crates/kreuzberg-node
    cmds:
      - task: typescript:install
  typescript:build:
    desc: Build TypeScript package
    dir: crates/kreuzberg-node
    cmds:
      - pnpm build
  typescript:test:
    desc: Run TypeScript tests
    dir: crates/kreuzberg-node
    cmds:
      - pnpm test
  typescript:lint:
    desc: Lint TypeScript code with auto-fix (biome)
    dir: crates/kreuzberg-node
    cmds:
      - pnpm lint:fix
  typescript:lint:check:
    desc: Lint TypeScript code in check-only mode (biome, no fixes)
    dir: crates/kreuzberg-node
    cmds:
      - pnpm lint
  typescript:format:
    desc: Format TypeScript code with modifications (biome)
    dir: crates/kreuzberg-node
    cmds:
      - pnpm format
  typescript:format:check:
    desc: Check TypeScript code formatting without modifications (biome)
    dir: crates/kreuzberg-node
    cmds:
      - pnpm exec biome format typescript
  typescript:update:
    desc: Update TypeScript dependencies
    dir: crates/kreuzberg-node
    cmds:
      - echo "Updating TypeScript dependencies..."
      - corepack up
      - pnpm up --latest
  java:install:
    desc: Install Java dependencies
    dir: packages/java
    cmds:
      - mvn clean install -DskipTests
  java:setup:
    desc: Alias for java:install (idempotent)
    dir: packages/java
    cmds:
      - task: java:install
  java:build:
    desc: Build Java package
    dir: packages/java
    cmds:
      - mvn clean package -DskipTests
  java:test:
    desc: Run Java tests
    dir: packages/java
    cmds:
      - mvn test
  java:lint:
    desc: Lint Java code with auto-fix (checkstyle + PMD)
    dir: packages/java
    cmds:
      - mvn checkstyle:check
      - mvn pmd:check pmd:cpd-check
  java:lint:check:
    desc: Lint Java code in check-only mode (checkstyle + PMD, no fixes)
    dir: packages/java
    cmds:
      - mvn checkstyle:check
      - mvn pmd:check pmd:cpd-check
  java:format:
    desc: Format Java code with modifications (checkstyle + PMD validation)
    dir: packages/java
    cmds:
      - mvn checkstyle:check
      - mvn pmd:check pmd:cpd-check
  java:format:check:
    desc: Check Java code formatting without modifications (checkstyle + PMD validation)
    dir: packages/java
    cmds:
      - mvn checkstyle:check
      - mvn pmd:check pmd:cpd-check
  java:update:
    desc: Update Java dependencies
    dir: packages/java
    cmds:
      - echo "Checking for dependency updates..."
      - mvn versions:display-dependency-updates
      - mvn versions:display-plugin-updates
  e2e:rust:generate:
    desc: Generate Rust E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang rust --fixtures fixtures
        --output e2e
  e2e:rust:format:
    desc: Format generated Rust E2E sources
    cmds:
      - cargo fmt --manifest-path e2e/rust/Cargo.toml
  e2e:rust:lint:
    desc: Lint Rust E2E crate with clippy
    cmds:
      - cargo clippy -p e2e-rust -- -D warnings
  e2e:rust:test:
    desc: Run Rust E2E tests
    cmds:
      - cargo test -p e2e-rust --release
  e2e:rust:verify:
    desc: Regenerate and validate Rust E2E suite (generate + format + lint + test)
    cmds:
      - task: e2e:rust:generate
      - task: e2e:rust:format
      - task: e2e:rust:lint
      - task: e2e:rust:test
  e2e:python:generate:
    desc: Generate Python E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang python --fixtures fixtures
        --output e2e
  e2e:python:lint:
    desc: Lint generated Python E2E suite (ruff + mypy)
    dir: packages/python
    cmds:
      - uv run ruff check ../../e2e/python/tests
      - uv run ruff format ../../e2e/python/tests
      - uv run ruff format --check ../../e2e/python/tests
      - uv run mypy ../../e2e/python/tests
  e2e:python:test:
    desc: Run Python E2E tests
    dir: packages/python
    cmds:
      - uv run pytest ../../e2e/python/tests
  e2e:python:verify:
    desc: Regenerate and validate Python E2E suite (generate + lint + test)
    cmds:
      - task: e2e:python:generate
      - task: e2e:python:lint
      - task: e2e:python:test
  e2e:ts:generate:
    desc: Generate TypeScript E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang typescript --fixtures
        fixtures --output e2e
      - pnpm biome format --write e2e/typescript/tests
      - pnpm biome check e2e/typescript/tests
  e2e:ts:lint:
    desc: Lint generated TypeScript E2E suite (biome)
    cmds:
      - pnpm biome format --write e2e/typescript/tests
      - pnpm biome check e2e/typescript/tests
  e2e:ts:test:
    desc: Run TypeScript E2E tests
    cmds:
      - pnpm install -r
      - cd crates/kreuzberg-node && pnpm build
      - pnpm vitest run --root e2e/typescript/tests
  e2e:ts:verify:
    desc: Regenerate and validate TypeScript E2E suite (generate + lint + test)
    cmds:
      - task: e2e:ts:generate
      - task: e2e:ts:lint
      - task: e2e:ts:test
  e2e:ruby:generate:
    desc: Generate Ruby E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang ruby --fixtures fixtures --output e2e
  e2e:ruby:lint:
    desc: Lint generated Ruby E2E suite
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yml ../../e2e/ruby/spec"
  e2e:ruby:test:
    desc: Run Ruby E2E tests
    dir: packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rspec ../../e2e/ruby/spec"
  e2e:ruby:verify:
    desc: Regenerate and validate Ruby E2E suite (generate + lint + test)
    cmds:
      - task: e2e:ruby:generate
      - task: e2e:ruby:lint
      - task: e2e:ruby:test
  e2e:java:generate:
    desc: Generate Java E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang java --fixtures fixtures --output e2e
  e2e:java:test:
    desc: Run Java E2E tests
    dir: e2e/java
    cmds:
      - mvn test
  e2e:java:verify:
    desc: Regenerate and validate Java E2E suite
    cmds:
      - task: java:build
      - task: e2e:java:generate
      - task: e2e:java:test
  e2e:go:generate:
    desc: Generate Go E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang go --fixtures fixtures --output e2e
      - scripts/e2e/go/format.sh
  e2e:go:test:
    desc: Run Go E2E tests
    cmds:
      - scripts/e2e/go/test.sh
  e2e:go:verify:
    desc: Regenerate and validate Go E2E suite
    cmds:
      - task: e2e:go:generate
      - task: e2e:go:test
  e2e:csharp:generate:
    desc: Generate C# E2E tests from fixtures
    cmds:
      - cargo run -p kreuzberg-e2e-generator -- generate --lang csharp --fixtures fixtures --output e2e
  e2e:csharp:test:
    desc: Run C# E2E tests
    cmds:
      - bash scripts/e2e/csharp/test.sh
  e2e:csharp:verify:
    desc: Regenerate and validate C# E2E suite
    cmds:
      - task: e2e:csharp:generate
      - task: e2e:csharp:test
  e2e:all:verify:
    desc: Regenerate and validate E2E suites for all languages
    cmds:
      - task: e2e:rust:verify
      - task: e2e:python:verify
      - task: e2e:ts:verify
      - task: e2e:ruby:verify
      - task: e2e:java:verify
      - task: e2e:go:verify
      - task: e2e:csharp:verify
  cli:build:
    desc: Build CLI binary
    cmds:
      - cargo build --release --package kreuzberg-cli
  cli:install:
    desc: Install CLI binary
    cmds:
      - cargo install --path crates/kreuzberg-cli
  dev:install:
    desc: Install all dependencies
    cmds:
      - task: setup
  dev:test:
    desc: Run all tests
    cmds:
      - task: test
  dev:lint:
    desc: Lint all code
    cmds:
      - task: lint
  dev:format:
    desc: Format all code
    cmds:
      - task: format
  pre-commit:install:
    desc: Install pre-commit hooks
    cmds:
      - prek install
      - prek install --hook-type commit-msg
  pre-commit:run:
    desc: Run pre-commit on all files
    cmds:
      - prek run --all-files
  docs:build:
    desc: Build documentation
    cmds:
      - uv run mkdocs build --clean --strict
  docs:serve:
    desc: Serve documentation locally
    cmds:
      - uv run mkdocs serve
  docs:serve:versioned:
    desc: Serve versioned documentation with mike
    cmds:
      - uv run mike serve
  docs:deploy:v4:
    desc: Deploy v4 documentation with mike
    cmds:
      - uv run mike deploy --update-aliases 4.0 latest
      - uv run mike set-default latest
  docs:deploy:v3:
    desc: Deploy v3 documentation from tagged release
    cmds:
      - echo "Creating git worktree for v3 docs ({{.V3_TAG}})..."
      - git worktree remove --force /tmp/kreuzberg-v3-build 2>/dev/null || true
      - git worktree add /tmp/kreuzberg-v3-build {{.V3_TAG}}
      - echo "Disabling social plugin (requires cairo)..."
      - "sed -i.bak 's/^  - social$/  # - social/' /tmp/kreuzberg-v3-build/mkdocs.yaml"
      - echo "Building and deploying v3 docs..."
      - cd /tmp/kreuzberg-v3-build && uv sync --group docs --no-install-workspace && uv pip install mike
      - cd /tmp/kreuzberg-v3-build && uv run mike deploy 3.0 v3
      - echo "Cleaning up worktree..."
      - git worktree remove --force /tmp/kreuzberg-v3-build || true
  docs:deploy:all:
    desc: Deploy both v3 and v4 documentation
    cmds:
      - task: docs:deploy:v4
      - task: docs:deploy:v3
  docs:publish:
    desc: Publish documentation to GitHub Pages
    cmds:
      - uv run mike deploy --push 4.0 latest
  update:
    desc: Update all dependencies to latest versions (cargo upgrade, uv-bump, pnpm up --latest, etc.)
    cmds:
      - echo "Updating Rust dependencies..."
      - task: rust:update
      - echo "Updating Python dependencies..."
      - task: python:update
      - echo "Updating TypeScript dependencies..."
      - task: typescript:update
      - echo "Updating Ruby dependencies..."
      - task: ruby:update
      - echo "Updating Java dependencies..."
      - task: java:update
      - echo "Updating Go dependencies..."
      - task: go:update
      - echo "Updating C# dependencies..."
      - task: csharp:update
      - echo "Updating pre-commit hooks..."
      - prek autoupdate
      - echo "All dependencies updated"
  clean:rust:
    desc: Clean Rust build artifacts
    cmds:
      - cargo clean
  clean:python:
    desc: Clean Python build artifacts
    dir: packages/python
    cmds:
      - rm -rf build/ dist/ *.egg-info .pytest_cache .ruff_cache .mypy_cache
  clean:ruby:
    desc: Clean Ruby build artifacts
    dir: packages/ruby
    cmds:
      - rm -rf lib/*.bundle lib/*.so pkg/ tmp/
  clean:typescript:
    desc: Clean TypeScript build artifacts
    dir: packages/typescript
    cmds:
      - rm -rf dist/ node_modules/
  clean:java:
    desc: Clean Java build artifacts
    dir: packages/java
    cmds:
      - mvn clean
  clean:
    desc: Clean all build artifacts
    cmds:
      - task: clean:rust
      - task: clean:python
      - task: clean:ruby
      - task: clean:typescript
      - task: clean:java
  go:install:
    desc: Install Go tools and modules
    cmds:
      - scripts/go/install.sh {{.GOLANGCI_LINT_VERSION}}

  go:update:
    desc: Update Go dependencies and linters
    cmds:
      - scripts/go/update.sh {{.GOLANGCI_LINT_VERSION}}

  go:lint:
    desc: Lint Go code with auto-fix (gofmt + golangci-lint)
    dir: packages/go
    cmds:
      - go fmt ./...
      - golangci-lint run --config ../../.golangci.yml --fix ./...
  go:lint:check:
    desc: Lint Go code in check-only mode (gofmt + golangci-lint, no fixes)
    dir: packages/go
    cmds:
      - ../../scripts/go/format_check.sh
      - golangci-lint run --config ../../.golangci.yml ./...
  go:format:
    desc: Format Go code with modifications (gofmt)
    dir: packages/go
    cmds:
      - gofmt -w .
  go:format:check:
    desc: Check Go code formatting without modifications (gofmt)
    dir: packages/go
    cmds:
      - ../../scripts/go/format_check.sh

  go:test:
    desc: Run Go tests
    cmds:
      - scripts/go/test.sh

  csharp:install:
    desc: Restore C# dependencies
    dir: packages/csharp
    cmds:
      - dotnet restore

  csharp:build:
    desc: Build C# binding and benchmarks
    dir: packages/csharp
    cmds:
      - dotnet restore
      - dotnet build Kreuzberg/Kreuzberg.csproj -c Release
      - dotnet build Benchmark/Benchmark.csproj -c Release

  csharp:test:
    desc: Run C# tests
    cmds:
      - scripts/csharp/test.sh

  csharp:lint:
    desc: Lint/format C# code with auto-fix (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format Kreuzberg/Kreuzberg.csproj
      - dotnet format Kreuzberg.Tests/Kreuzberg.Tests.csproj
      - dotnet format Benchmark/Benchmark.csproj

  csharp:lint:check:
    desc: Check C# formatting without modifications (dotnet format verify)
    dir: packages/csharp
    cmds:
      - dotnet format Kreuzberg/Kreuzberg.csproj --verify-no-changes
      - dotnet format Kreuzberg.Tests/Kreuzberg.Tests.csproj --verify-no-changes
      - dotnet format Benchmark/Benchmark.csproj --verify-no-changes

  csharp:format:
    desc: Format C# code (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format Kreuzberg/Kreuzberg.csproj
      - dotnet format Kreuzberg.Tests/Kreuzberg.Tests.csproj
      - dotnet format Benchmark/Benchmark.csproj

  csharp:format:check:
    desc: Check C# formatting without modifications
    dir: packages/csharp
    cmds:
      - dotnet format Kreuzberg/Kreuzberg.csproj --verify-no-changes
      - dotnet format Kreuzberg.Tests/Kreuzberg.Tests.csproj --verify-no-changes
      - dotnet format Benchmark/Benchmark.csproj --verify-no-changes

  csharp:update:
    desc: Update/restore C# dependencies
    dir: packages/csharp
    cmds:
      - dotnet restore Kreuzberg/Kreuzberg.csproj
      - dotnet restore Kreuzberg.Tests/Kreuzberg.Tests.csproj
      - dotnet restore Benchmark/Benchmark.csproj

  smoke:node:
    desc: Run Node smoke test locally (require KREUZBERG_NODE_SPEC=file:/abs/path/to/kreuzberg.tgz)
    cmds:
      - scripts/smoke_node.sh
